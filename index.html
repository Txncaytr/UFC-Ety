<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFC MadFut</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--red:#e50914;--gold:#f5a623;--dark:#0a0a0f;--card-bg:rgba(255,255,255,.04);--border:rgba(255,255,255,.08);--text:#f0f0f0;--sub:#888;--green:#22c55e;--blue:#3b82f6;--purple:#a855f7;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(229,9,20,.12) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(245,166,35,.06) 0%,transparent 50%);pointer-events:none;z-index:0;}

/* ─── PAGES ─── */
.page{display:none;position:relative;z-index:1;}
.page.active{display:block;}

/* ─── LOGIN ─── */
#loginPage{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;}
#loginPage.active{display:flex;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,10vw,6rem);letter-spacing:4px;line-height:1;margin-bottom:6px;}
.logo span{color:var(--red);}
.logo-sub{font-size:.75rem;font-weight:700;letter-spacing:8px;color:var(--gold);text-transform:uppercase;margin-bottom:50px;}
.login-box{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:16px;padding:36px;width:100%;max-width:380px;backdrop-filter:blur(10px);}
.login-box h2{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px;margin-bottom:24px;color:var(--gold);}
.inp-group{margin-bottom:14px;}
.inp-group label{display:block;font-size:.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--sub);margin-bottom:6px;}
.inp-group input{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:white;font-family:'Barlow',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s;}
.inp-group input:focus{border-color:var(--red);}
#loginMsg{color:var(--red);font-size:.85rem;margin-top:10px;min-height:20px;}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--sub);font-size:.75rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* ─── BUTTONS ─── */
.btn{padding:11px 18px;border:none;border-radius:8px;font-family:'Barlow',sans-serif;font-weight:700;font-size:.88rem;letter-spacing:1px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
.btn-r{background:var(--red);color:white;}.btn-r:hover{background:#ff1a28;transform:translateY(-1px);}
.btn-o{background:transparent;color:white;border:1px solid var(--border);}.btn-o:hover{border-color:white;}
.btn-g{background:var(--gold);color:#000;}.btn-g:hover{background:#ffb84d;}
.btn-gh{background:rgba(255,255,255,.05);color:var(--sub);border:1px solid var(--border);}.btn-gh:hover{color:white;background:rgba(255,255,255,.1);}
.btn-gr{background:#22c55e;color:#000;}.btn-gr:hover{background:#16a34a;}
.btn-bl{background:rgba(59,130,246,.2);border:1px solid rgba(59,130,246,.4);color:var(--blue);}.btn-bl:hover{background:rgba(59,130,246,.35);}
.btn-pu{background:rgba(168,85,247,.2);border:1px solid rgba(168,85,247,.4);color:var(--purple);}
.btn-row{display:flex;gap:10px;margin-top:20px;}

/* ─── GAME SHELL ─── */
#gamePage{height:100vh;display:flex;flex-direction:column;overflow:hidden;}
#gamePage.active{display:flex;}

/* ─── TOPBAR ─── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(0,0,0,.7);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);z-index:200;flex-shrink:0;}
.topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:3px;}
.topbar-logo span{color:var(--red);}
.coins-badge{background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.3);border-radius:20px;padding:5px 12px;font-weight:700;font-size:.85rem;color:var(--gold);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.elo-pill{font-size:.72rem;font-weight:700;color:var(--gold);background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.2);border-radius:12px;padding:3px 8px;}
.notif-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;position:relative;}
.notif-dot{position:absolute;top:0;right:0;width:8px;height:8px;background:var(--red);border-radius:50%;}

/* ─── PAGE NAVIGATION (bottom tabs) ─── */
.page-nav{display:flex;background:rgba(0,0,0,.8);border-top:1px solid var(--border);flex-shrink:0;position:sticky;bottom:0;z-index:200;}
.page-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;border:none;background:transparent;color:var(--sub);cursor:pointer;transition:all .2s;gap:3px;min-width:0;}
.page-nav-btn .pnb-icon{font-size:1.2rem;transition:transform .2s;}
.page-nav-btn .pnb-label{font-size:.55rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;}
.page-nav-btn.active{color:var(--red);}
.page-nav-btn.active .pnb-icon{transform:scale(1.15);}

/* ─── INNER TABS (top of each page) ─── */
.inner-tabs{display:flex;gap:0;background:rgba(0,0,0,.4);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;}
.inner-tab{padding:10px 16px;border:none;background:transparent;color:var(--sub);font-family:'Barlow',sans-serif;font-weight:700;font-size:.75rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;white-space:nowrap;border-bottom:2px solid transparent;}
.inner-tab:hover{color:white;}
.inner-tab.active{color:white;border-bottom-color:var(--red);}

/* ─── CONTENT AREA ─── */
.content{flex:1;overflow-y:auto;padding:16px;max-width:960px;margin:0 auto;width:100%;}

/* ─── SECTION TITLES ─── */
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:3px;margin-bottom:4px;}
.sec-title span{color:var(--red);}
.sec-sub{color:var(--sub);font-size:.82rem;margin-bottom:16px;}

/* ─── CARDS ─── */
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:14px;transition:all .2s;}
.card:hover{border-color:rgba(255,255,255,.15);}
.fighter-card{display:flex;align-items:center;justify-content:space-between;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:8px;transition:all .2s;}
.fighter-card:hover{border-color:rgba(255,255,255,.15);}
.fighter-card.prime{border-color:rgba(245,166,35,.3);background:rgba(245,166,35,.04);}
.f-name{font-weight:700;font-size:.92rem;}
.f-meta{font-size:.72rem;color:var(--sub);margin-top:2px;}
.prime-badge{background:rgba(245,166,35,.2);border:1px solid rgba(245,166,35,.4);border-radius:4px;padding:2px 6px;font-size:.62rem;font-weight:700;color:var(--gold);letter-spacing:1px;text-transform:uppercase;}
.lvl-badge{background:rgba(229,9,20,.2);border:1px solid rgba(229,9,20,.4);border-radius:4px;padding:2px 6px;font-size:.62rem;font-weight:700;color:var(--red);}
.sell-btn{background:rgba(229,9,20,.15);border:1px solid rgba(229,9,20,.2);color:var(--red);border-radius:6px;padding:5px 9px;font-family:'Barlow',sans-serif;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .2s;}
.sell-btn:hover{background:rgba(229,9,20,.3);}

/* ─── STAT BARS ─── */
.stat-bars{display:flex;flex-direction:column;gap:4px;margin-top:8px;}
.stat-row{display:flex;align-items:center;gap:8px;font-size:.67rem;}
.stat-lbl{width:26px;color:var(--sub);letter-spacing:1px;flex-shrink:0;}
.stat-val{width:22px;text-align:right;font-weight:700;font-size:.68rem;flex-shrink:0;}
.stat-track{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.stat-fill{height:100%;border-radius:3px;transition:width .4s;}

/* ─── FIGHT RESULT ─── */
.fight-result-box{background:rgba(229,9,20,.06);border:1px solid rgba(229,9,20,.2);border-radius:12px;padding:16px;margin-top:12px;}

/* ─── PACK STYLES ─── */
.packs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.pack-card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;}
.pack-card:hover{border-color:var(--red);transform:translateY(-2px);}

/* ─── HOME STATS ─── */
.home-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.stat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--red);line-height:1;}
.stat-lbl2{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--sub);margin-top:3px;}

/* ─── PACK OVERLAY ─── */
#packOverlay{position:fixed;inset:0;z-index:9999;background:#05050d;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
#packOverlay.show{display:flex;}
#packPhase1{display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-pack-icon{font-size:8rem;animation:packShake .35s infinite;filter:drop-shadow(0 0 50px rgba(229,9,20,.7));user-select:none;}
@keyframes packShake{0%{transform:rotate(-7deg) scale(1)}50%{transform:rotate(7deg) scale(1.1)}100%{transform:rotate(-7deg) scale(1)}}
.opening-label{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:8px;color:var(--sub);margin-top:24px;animation:blink .7s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
#packPhase2{display:none;flex-direction:column;align-items:center;width:100%;max-width:360px;}
.scratch-label{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:6px;color:var(--sub);margin-bottom:16px;animation:blink 1s infinite;}
.scratch-wrap{position:relative;width:280px;height:280px;border-radius:20px;overflow:hidden;cursor:crosshair;box-shadow:0 0 60px rgba(229,9,20,.3);}
.scratch-wrap.prime-wrap{box-shadow:0 0 60px rgba(245,166,35,.4);}
.scratch-under{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#12122a,#1e1e3f);z-index:1;padding:20px;}
.scratch-under.prime-under{background:linear-gradient(135deg,#1c1400,#2e2000);}
#scratchCanvas{position:absolute;inset:0;z-index:2;border-radius:20px;cursor:crosshair;}
#packPhase3{display:none;flex-direction:column;align-items:center;width:100%;max-width:360px;}
.final-card{background:linear-gradient(135deg,#12122a,#1e1e3f);border-radius:20px;padding:36px;text-align:center;position:relative;overflow:hidden;animation:revealPop .5s cubic-bezier(.34,1.56,.64,1);width:100%;border:1px solid rgba(229,9,20,.3);}
.final-card.prime-final{background:linear-gradient(135deg,#1c1400,#2e2000);border-color:rgba(245,166,35,.4);}
.final-card::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(229,9,20,.1),transparent 70%);pointer-events:none;}
.final-card.prime-final::after{background:radial-gradient(ellipse at 50% 30%,rgba(245,166,35,.15),transparent 70%);}
@keyframes revealPop{0%{transform:scale(.7);opacity:0}70%{transform:scale(1.04);opacity:1}100%{transform:scale(1)}}
.final-close-btn{margin-top:20px;padding:12px 36px;background:var(--red);color:white;border:none;border-radius:10px;font-family:'Barlow',sans-serif;font-weight:700;font-size:.9rem;letter-spacing:2px;cursor:pointer;transition:all .2s;text-transform:uppercase;position:relative;z-index:1;}
.final-close-btn:hover{background:#ff1a28;transform:scale(1.04);}
.final-close-btn.prime-btn{background:var(--gold);color:#000;}

/* ─── DRAFT ─── */
.weight-classes{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:16px;}
.draft-card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .2s;min-height:74px;}
.draft-card:hover:not(.picked){border-color:var(--red);background:rgba(229,9,20,.06);}
.draft-card.picked{border-color:rgba(229,9,20,.5);background:rgba(229,9,20,.08);cursor:default;}
.pick-btn{background:var(--red);color:white;border:none;border-radius:5px;padding:4px 9px;font-family:'Barlow',sans-serif;font-weight:700;font-size:.72rem;cursor:pointer;}
.pick-btn:hover{background:#ff1a28;}

/* ─── SPIN ─── */
.log-entry{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;font-size:.82rem;line-height:1.7;}

/* ─── SHOP ─── */
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
.shop-item{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:20px 16px;text-align:center;cursor:pointer;transition:all .2s;}
.shop-item:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.2);}

/* ─── MARKET ─── */
.market-listing{display:flex;align-items:center;justify-content:space-between;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:8px;gap:8px;}

/* ─── RIVALRY ─── */
.rivalry-card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.rivalry-bar-wrap{margin-top:8px;height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;display:flex;}

/* ─── ACHIEVEMENT ─── */
.ach-card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:14px;}
.ach-card.unlocked{border-color:rgba(245,166,35,.4);background:rgba(245,166,35,.04);}
.ach-icon{font-size:2.2rem;flex-shrink:0;}
.ach-badge{background:rgba(245,166,35,.2);border:1px solid rgba(245,166,35,.3);border-radius:20px;padding:2px 8px;font-size:.62rem;font-weight:700;color:var(--gold);letter-spacing:1px;}

/* ─── FUSION ─── */
.fusion-slots{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;margin-bottom:16px;}
.fusion-slot{background:rgba(255,255,255,.03);border:2px dashed rgba(255,255,255,.15);border-radius:14px;padding:20px 12px;text-align:center;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;}
.fusion-slot:hover{border-color:var(--purple);}
.fusion-slot.filled{border-style:solid;border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.06);}
.fusion-plus{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--sub);}

/* ─── POWERUP ─── */
.powerup-card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.powerup-active{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.04);}

/* ─── BANK ─── */
.bank-tier{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.interest-bar{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-top:8px;}
.interest-fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s;}

/* ─── NEWS FEED ─── */
.news-item{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.news-time{font-size:.65rem;color:var(--sub);letter-spacing:2px;margin-bottom:4px;}
.news-title{font-weight:700;font-size:.88rem;margin-bottom:2px;}
.news-body{font-size:.78rem;color:var(--sub);}

/* ─── WEEKLY EVENTS ─── */
.event-card{background:linear-gradient(135deg,rgba(229,9,20,.08),rgba(245,166,35,.04));border:1px solid rgba(229,9,20,.2);border-radius:14px;padding:18px;margin-bottom:10px;}
.event-timer{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--gold);letter-spacing:3px;}

/* ─── MINI GAMES ─── */
#reactionCircle{width:160px;height:160px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:16px auto;cursor:pointer;transition:all .15s;user-select:none;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;border:3px solid rgba(229,9,20,.3);background:rgba(229,9,20,.1);color:var(--sub);}
#reactionCircle.ready{background:rgba(34,197,94,.2);border-color:#22c55e;color:#22c55e;animation:pulse .6s infinite;}
#reactionCircle.hit{background:rgba(245,166,35,.3);border-color:var(--gold);color:var(--gold);}
#reactionCircle.early{background:rgba(229,9,20,.3);border-color:var(--red);color:var(--red);}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

/* Punch timing */
#punchBar{height:28px;background:rgba(255,255,255,.06);border-radius:14px;overflow:hidden;position:relative;cursor:pointer;border:1px solid rgba(255,255,255,.1);}
#punchBar .zone{position:absolute;top:0;height:100%;background:rgba(34,197,94,.3);transition:left .05s;}
#punchBar .cursor{position:absolute;top:0;width:4px;height:100%;background:white;border-radius:2px;transition:left .05s linear;}
#punchBar .sweet{position:absolute;top:0;height:100%;background:rgba(245,166,35,.5);border:1px solid var(--gold);}

/* ─── NOTIFICATIONS PANEL ─── */
#notifPanel{position:fixed;top:0;right:-320px;width:300px;height:100vh;background:#0f0f1a;border-left:1px solid var(--border);z-index:5000;transition:right .3s;overflow-y:auto;padding:16px;}
#notifPanel.open{right:0;}
.notif-item{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:.8rem;}
.notif-item.unread{border-color:rgba(229,9,20,.3);background:rgba(229,9,20,.04);}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:80px;right:16px;background:rgba(15,15,26,.97);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:.85rem;z-index:9998;transform:translateY(80px);opacity:0;transition:all .3s;max-width:280px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.gold{border-color:rgba(245,166,35,.4);color:var(--gold);}
.toast.green{border-color:rgba(34,197,94,.4);color:#22c55e;}
.toast.red{border-color:rgba(229,9,20,.4);color:var(--red);}
.toast.blue{border-color:rgba(59,130,246,.4);color:var(--blue);}
.toast.purple{border-color:rgba(168,85,247,.4);color:var(--purple);}

/* ─── MISC ─── */
.empty{text-align:center;color:var(--sub);padding:48px 20px;}
.empty .icon{font-size:2.8rem;margin-bottom:10px;}
select{width:100%;background:#1c1c2e;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:9px 12px;color:#fff;font-family:'Barlow',sans-serif;font-size:.85rem;outline:none;cursor:pointer;}
select option{background:#1c1c2e;}
select:focus{border-color:var(--red);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
input[type=text],input[type=password]{outline:none;}
.sr{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.sr .btn{flex:unset;padding:7px 14px;font-size:.75rem;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="page active">
  <div class="logo">UFC <span>MAD</span>FUT</div>
  <div class="logo-sub">Ultimate Card Game</div>
  <div class="login-box">
    <h2>Sign In</h2>
    <div class="inp-group"><label>Username</label><input id="username" type="text" placeholder="Enter username"></div>
    <div class="inp-group"><label>Password</label><input id="password" type="password" placeholder="Enter password"></div>
    <div class="btn-row">
      <button class="btn btn-r" onclick="login()">Login</button>
      <button class="btn btn-o" onclick="register()">Register</button>
    </div>
    <div id="loginMsg"></div>
    <div class="divider">or</div>
    <button class="btn btn-gh" style="width:100%" onclick="guestPlay()">🥊 Play as Guest</button>
  </div>
</div>

<!-- GAME -->
<div id="gamePage" class="page">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-logo">UFC <span>MAD</span>FUT</div>
    <div class="coins-badge">🪙 <span id="coinsDisplay">0</span></div>
    <div class="topbar-right">
      <div class="elo-pill" id="eloPill">⚫ 1000</div>
      <button class="notif-btn" onclick="toggleNotif()" id="notifBtn">🔔<span class="notif-dot" id="notifDot" style="display:none"></span></button>

function toast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;setTimeout(()=>t.className='toast',2800);}
function statColor(v){return v>=90?'#22c55e':v>=75?'var(--gold)':v>=60?'#3b82f6':'#888';}
function starsStr(n){return'★'.repeat(n)+'☆'.repeat(6-n);}
function renderStatBars(stats){
  if(!stats)return'';
  return`<div class="stat-bars">${statKeys.map(k=>`<div class="stat-row"><div class="stat-lbl">${k}</div><div class="stat-track"><div class="stat-fill" style="width:${Math.min(stats[k]||70,99)}%;background:${statColor(stats[k]||70)}"></div></div><div class="stat-val" style="color:${statColor(stats[k]||70)}">${stats[k]||70}</div></div>`).join('')}</div>`;
}
function ovr(f){return Math.round(Object.values(f.stats).reduce((a,b)=>a+b,0)/6);}
function fightScore(f){const s=f.stats;return(s.STR*.22+s.GRP*.18+s.SPD*.18+s.PWR*.20+s.CHN*.12+s.CRD*.10)*(f.prime?1.15:1)*((f.level||1)*0.05+0.95)*(0.85+Math.random()*.3);}
function runFight(f1,f2){const s1=fightScore(f1),s2=fightScore(f2);const winner=s1>s2?f1:f2,loser=winner===f1?f2:f1;const s=winner.stats;const r=Math.random()*100;let method=r<(s.PWR-60)/.8?'KO':r<(s.PWR-60)/.8+(s.GRP-50)/.6?'Submission':r<60?'TKO':'Decision';return{winner,loser,method};}
function recordRivalry(a,b,aWon){const k=[a,b].sort().join('|');if(!rivalries[k])rivalries[k]={a,b,aW:0,bW:0,total:0};rivalries[k].total++;if(aWon)rivalries[k].aW++;else rivalries[k].bW++;}

function getWeeklyBonus(method){if(!activeWeeklyEvent)return 0;if(activeWeeklyEvent.bonus==='ko'&&method==='KO')return activeWeeklyEvent.multiplier;if(activeWeeklyEvent.bonus==='sub'&&method==='Submission')return activeWeeklyEvent.multiplier;return 0;}

const BANK_TIERS=[

function checkBankInterest(){const now=Date.now();Object.entries(bank).forEach(([tid,dep])=>{if(!dep||!dep.amount)return;const elapsed=now-dep.depositTime;const tier=BANK_TIERS.find(t=>t.id===tid);if(!tier)return;const periods=Math.floor(elapsed/(24*60*60*1000));if(periods>0&&dep.lastPaid!==periods){const interest=Math.floor(dep.amount*tier.rate*periods);dep.lastPaid=periods;dep.earned=(dep.earned||0)+interest;coins+=interest;addNotif('🏦','Bank-Zinsen!',`${tier.name}: +${interest}🪙 Zinsen erhalten.`);updateTopbar();saveUser();}});}
function depositBank(tid){const tier=BANK_TIERS.find(t=>t.id===tid);const input=document.getElementById('bankIn_'+tid);if(!input||!tier)return;const amt=parseInt(input.value)||0;if(amt<tier.min){toast(`Minimum ${tier.min}🪙!`,'red');return;}if(amt>coins){toast('Nicht genug Coins!','red');return;}if(bank[tid]){bank[tid].amount+=amt;}else{bank[tid]={amount:amt,depositTime:Date.now(),lastPaid:0,earned:0};}coins-=amt;toast(`${amt}🪙 in ${tier.name} investiert!`,'green');updateTopbar();saveUser();renderMorePage(3);}
function withdrawBank(tid){const dep=bank[tid];if(!dep||!dep.amount){toast('Nichts zu abheben!','red');return;}const total=dep.amount+(dep.earned||0);coins+=total;toast(`${total}🪙 abgehoben (inkl. ${dep.earned||0}🪙 Zinsen)!`,'gold');delete bank[tid];updateTopbar();saveUser();renderMorePage(3);}

  return`<div class="bank-tier">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px">

    </div>
    ${hasDeposit?`<div class="interest-bar"><div class="interest-fill" style="width:${pct}%"></div></div><div style="font-size:.68rem;color:var(--sub);margin-top:4px;margin-bottom:8px">Nächste Zinszahlung: ${pct}%</div><button class="btn btn-gr" style="width:100%;padding:7px;font-size:.78rem" onclick="withdrawBank('${t.id}')">💰 ABHEBEN (${(dep.amount+(dep.earned||0)).toLocaleString()}🪙)</button>`
    :`<div style="display:flex;gap:8px"><input id="bankIn_${t.id}" type="number" min="${t.min}" max="${t.max}" placeholder="${t.min}+" style="flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:white;font-family:Barlow,sans-serif;font-size:.82rem;outline:none"><button class="btn btn-gr" style="flex:unset;padding:8px 14px;font-size:.78rem" onclick="depositBank('${t.id}')">Einzahlen</button></div>`}
  </div>`}).join('')}`;

function swapF(){const s1=document.getElementById('fl1'),s2=document.getElementById('fl2');const v1=s1.value,v2=s2.value;for(let i=0;i<s1.options.length;i++)if(s1.options[i].value===v2){s1.selectedIndex=i;break;}for(let i=0;i<s2.options.length;i++)if(s2.options[i].value===v1){s2.selectedIndex=i;break;}updateFightPreview();}
function updateFightPreview(){

function checkFightCD(){const now=Date.now(),diff=now-lastFightTime;const cd=document.getElementById('fightCD'),btn=document.getElementById('fightBtnEl');if(diff<FIGHT_CD){const left=Math.ceil((FIGHT_CD-diff)/1000),m=Math.floor(left/60),s=left%60;if(cd)cd.textContent=`⏳ ${m}:${s<10?'0':''}${s}`;if(btn){btn.disabled=true;btn.style.opacity='.5';}setTimeout(checkFightCD,1000);return false;}if(cd)cd.textContent='';if(btn){btn.disabled=false;btn.style.opacity='1';}return true;}

function buildResultHTML(f1,f2,winner,method,coinGain,betMsg,quote1,quote2){
  const n1=f1.name,n2=f2.name,wColor=winner.name===n1?'#22c55e':'#3b82f6';
  const s1=f1.stats,s2=f2.stats;
  function mr(k,a,b){const c1=a>b?'#22c55e':a<b?'var(--red)':'#888',c2=b>a?'#22c55e':b<a?'var(--red)':'#888';return`<div style="display:flex;align-items:center;gap:5px;font-size:.7rem;margin-bottom:3px"><div style="width:22px;text-align:right;font-weight:700;color:${c1}">${a}</div><div style="flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;position:relative"><div style="position:absolute;right:50%;width:${Math.max(0,a-b)/2}%;height:100%;background:${c1}"></div><div style="position:absolute;left:50%;width:${Math.max(0,b-a)/2}%;height:100%;background:${c2}"></div></div><div style="width:22px;font-weight:700;color:${c2}">${b}</div><div style="width:26px;text-align:center;color:var(--sub);font-size:.63rem">${k}</div></div>`;}
  const sc=statKeys.map(k=>mr(k,s1[k]||70,s2[k]||70)).join('');
  const div=f1.weight===f2.weight?f1.weight:'Cross-Div';
  return`<div class="fight-result-box">
    <div style="font-size:.7rem;color:var(--sub);margin-bottom:8px;letter-spacing:2px">${div} · ${method}</div>
    ${quote1?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px"><div style="background:rgba(255,255,255,.03);border-radius:8px;padding:8px;font-size:.72rem;font-style:italic;color:var(--sub)">"${quote1}"<div style="color:var(--sub);font-size:.65rem;margin-top:3px">— ${f1.name.split(' ').slice(-1)[0]}</div></div><div style="background:rgba(255,255,255,.03);border-radius:8px;padding:8px;font-size:.72rem;font-style:italic;color:var(--sub)">"${quote2}"<div style="color:var(--sub);font-size:.65rem;margin-top:3px">— ${f2.name.split(' ').slice(-1)[0]}</div></div></div>`:''}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="text-align:center;flex:1"><div style="font-weight:700;font-size:.88rem;color:${winner.name===n1?wColor:'var(--sub)'}">${n1}</div><div style="font-size:.68rem;color:var(--sub)">${'★'.repeat(f1.stars)}</div></div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--red);padding:0 6px">VS</div>
      <div style="text-align:center;flex:1"><div style="font-weight:700;font-size:.88rem;color:${winner.name===n2?wColor:'var(--sub)'}">${n2}</div><div style="font-size:.68rem;color:var(--sub)">${'★'.repeat(f2.stars)}</div></div>
    </div>
    <div style="background:rgba(255,255,255,.03);border-radius:8px;padding:8px;margin-bottom:10px">${sc}</div>
    <div style="text-align:center">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;color:${wColor}">🏆 ${winner.name}</div>
      <div style="color:var(--sub);font-size:.78rem;margin-top:3px">gewinnt durch ${method}</div>
      <div style="color:var(--gold);font-weight:700;margin-top:6px">+${coinGain}🪙${betMsg}</div>
      <button class="btn btn-o" style="padding:7px 16px;font-size:.75rem;margin-top:8px;flex:unset" onclick="doRematch()">🔁 Rematch</button>
    </div>
  </div>`;
}

function doSingleFight(f1ov,f2ov,silent){
  if(!f1ov&&!checkFightCD())return null;
  let f1,f2;
  if(f1ov&&f2ov){f1=f1ov;f2=f2ov;}else{
    const v1=(document.getElementById('fl1')||{}).value||'',v2=(document.getElementById('fl2')||{}).value||'';
    if(!v1||!v2){toast('Zwei Fighter wählen!','red');return null;}
    const[n1,w1]=v1.split('||'),[n2,w2]=v2.split('||');
    const pool=[...fighters,...myCol];
    f1=pool.find(x=>x.name===n1&&x.weight===w1)||pool.find(x=>x.name===n1);
    f2=pool.find(x=>x.name===n2&&x.weight===w2)||pool.find(x=>x.name===n2);
    if(!f1||!f2||f1.name===f2.name){toast('Zwei verschiedene Fighter!','red');return null;}
  }
  _lF1=f1;_lF2=f2;
  // Check powerups
  const starBoost=getActivePowerup('win_chance');
  const dblCoins=getActivePowerup('double_coins');
  const{winner,loser,method}=runFight(f1,f2);
  if(!f1ov)lastFightTime=Date.now();
  let coinGain=30,betMsg='';
  if(!silent){
    if(currentBet===1&&winner.name===f1.name){coinGain+=100;betMsg=' +100🪙 Wette!';}
    else if(currentBet===2&&winner.name===f2.name){coinGain+=100;betMsg=' +100🪙 Wette!';}
    else if(currentBet!==0)betMsg=' Wette verloren.';
    const wBonus=getWeeklyBonus(method);if(wBonus){coinGain+=wBonus;betMsg+=` +${wBonus}🪙 Event!`;}
    if(dblCoins){coinGain*=2;usePowerup('double_coins');}
    coins+=coinGain;
  }
  recordRivalry(f1.name,f2.name,winner.name===f1.name);
  fightHist.unshift(`${f1.name} vs ${f2.name} → ${winner.name} (${method})${!silent?' +'+coinGain+'🪙':''}`);
  const q1=getFighterQuote(f1.name),q2=getFighterQuote(f2.name);
  const resultHTML=buildResultHTML(f1,f2,winner,method,coinGain,betMsg,q1,q2);
  if(!silent){
    const re=document.getElementById('fightResultEl');if(re)re.innerHTML=resultHTML;
    toast(`${winner.name} gewinnt! +${coinGain}🪙`,'gold');
    currentBet=0;setBet(0);updateTopbar();saveUser();checkAchievements();
    setTimeout(checkFightCD,1000);
  }
  return{winner,loser,method,resultHTML,coinGain};
}
function doRematch(){if(!_lF1||!_lF2){toast('Kein vorheriger Kampf!','red');return;}rematchCount++;const b=rematchCount*10;coins+=b;const r=doSingleFight(_lF1,_lF2,false);if(r){toast(`🔁 Rematch #${rematchCount} +${b}🪙 Bonus`,'gold');updateTopbar();saveUser();}}

// DRAFT
let userTeam={},botTeam={},lastDraftTime=0;
const DRAFT_CD=2*60*1000;
function renderDraftUI(){return`<div class="sec-title">DRAFT <span>MODE</span></div><div class="sec-sub">Wähle Fighter pro Klasse und kämpfe gegen den Bot</div><div class="weight-classes" id="draftCont"></div><button class="btn btn-r" id="draftFightBtn" style="display:none;width:100%;padding:14px;letter-spacing:2px" onclick="runDraftFight()">⚔️ FIGHT BOT</button><div id="draftResultEl"></div>`;}
function populateDraft(){userTeam={};botTeam={};const b=document.getElementById('draftFightBtn');if(b)b.style.display='none';const r=document.getElementById('draftResultEl');if(r)r.innerHTML='';renderDraftCards();}
function renderDraftCards(){const c=document.getElementById('draftCont');if(!c)return;c.innerHTML='';weights.forEach(w=>{const card=document.createElement('div');card.className='draft-card'+(userTeam[w]?' picked':'');card.id='dc-'+w;if(userTeam[w]){const f=userTeam[w];card.innerHTML=`<div style="font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:2px;color:var(--sub);margin-bottom:4px">${w}</div><div style="font-weight:700">${f.name}</div><div style="color:var(--gold)">${'★'.repeat(f.stars)}</div>`;}else{card.innerHTML=`<div style="font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:2px;color:var(--sub);margin-bottom:4px">${w}</div><div style="color:#aaa;font-size:.82rem">👆 Antippen</div>`;card.onclick=()=>openDraftPicker(w);}c.appendChild(card);});if(Object.keys(userTeam).length===weights.length){const b=document.getElementById('draftFightBtn');if(b)b.style.display='block';}}
function openDraftPicker(w){const card=document.getElementById('dc-'+w);const opts=[...fBW[w]].sort(()=>Math.random()-.5).slice(0,3);card.onclick=null;card.innerHTML=`<div style="font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:2px;color:var(--sub);margin-bottom:6px">${w}</div><div style="display:flex;flex-direction:column;gap:5px">`+opts.map(f=>`<div style="display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:7px;padding:8px 10px;font-size:.82rem"><span><b>${f.name}</b> ${'★'.repeat(f.stars)}</span><button class="pick-btn" onclick="event.stopPropagation();doPick('${w}','${f.name}')">Pick</button></div>`).join('')+'</div>';}
function doPick(w,name){const f=fighters.find(x=>x.name===name&&x.weight===w);if(!f)return;userTeam[w]=f;botTeam[w]=rand(fBW[w]);renderDraftCards();}
function runDraftFight(){const now=Date.now();if(now-lastDraftTime<DRAFT_CD){const l=Math.ceil((DRAFT_CD-(now-lastDraftTime))/1000);toast(`Warte ${Math.floor(l/60)}:${(l%60+'').padStart(2,'0')}!`,'red');return;}lastDraftTime=now;let up=0,bp=0;const rows=weights.map(w=>{const u=userTeam[w],b=botTeam[w];const uW=Math.random()<(.35+u.stars*.08)*(u.prime?1.2:1);if(uW)up++;else bp++;recordRivalry(u.name,b.name,uW);return`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:.82rem"><span><b>${w}</b>: ${u.name} vs ${b.name}</span><span>${uW?'<span style="color:#22c55e">✅ Du</span>':'<span style="color:var(--red)">❌ Bot</span>'} (${randMethod()})</span></div>`;}).join('');const won=up>bp,cr=won?200:50;coins+=cr;fightHist.unshift(`Draft ${up}-${bp} Bot → ${won?'WIN':'LOSS'} (+${cr}🪙)`);const dr=document.getElementById('draftResultEl');if(dr)dr.innerHTML=`<div class="fight-result-box" style="margin-top:12px">${rows}<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px"><div style="font-size:1.1rem;font-weight:900">Du ${up} – Bot ${bp}</div><div style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:${won?'#22c55e':'var(--red)'};">${won?'🏆 WIN!':'💀 LOSS'}</div></div><div style="color:var(--gold);font-weight:700;margin-top:6px">+${cr}🪙</div><button class="btn btn-o" style="margin-top:10px;width:100%;padding:9px;font-size:.78rem" onclick="populateDraft()">NOCHMAL</button></div>`;toast(won?`Draft Win! +${cr}🪙`:`Loss. +${cr}🪙`,won?'gold':'red');updateTopbar();saveUser();checkAchievements();}

// SURVIVAL
let survivalState=null;
function renderSurvivalUI(){return`<div class="sec-title">💀 SURVIVAL <span>MODE</span></div><div class="sec-sub">Kämpfe bis zur Niederlage – Rekord brechen!</div><div id="survCont"></div>`;}
function renderSurvivalContent(){const el=document.getElementById('survCont');if(!el)return;const record=parseInt(localStorage.getItem('sRec')||'0');if(!survivalState){el.innerHTML=`<div style="text-align:center;margin-bottom:16px"><div style="font-size:.68rem;color:var(--sub);letter-spacing:3px">REKORD</div><div style="font-family:'Bebas Neue',sans-serif;font-size:3.5rem;color:var(--gold);line-height:1">${record}</div><div style="font-size:.68rem;color:var(--sub)">SIEGE</div></div><div class="card"><div style="font-size:.7rem;color:var(--sub);letter-spacing:2px;margin-bottom:8px">FIGHTER WÄHLEN</div><select id="survSel" style="width:100%;margin-bottom:10px">${fighters.sort((a,b)=>b.stars-a.stars).map(f=>`<option value="${f.name}||${f.weight}">${f.name} · ${f.weight} · ${'★'.repeat(f.stars)}${f.prime?' ✦':''}</option>`).join('')}</select><button class="btn btn-r" style="width:100%;padding:12px;letter-spacing:2px" onclick="startSurvival()">💀 STARTEN</button></div>`;return;}const f=survivalState.fighter,hp=Math.max(0,survivalState.hp),hpPct=(hp/survivalState.maxHp)*100,hpC=hpPct>60?'#22c55e':hpPct>30?'var(--gold)':'var(--red)';el.innerHTML=`<div style="background:var(--card-bg);border:1px solid rgba(229,9,20,.3);border-radius:14px;padding:16px"><div style="display:flex;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px"><div><div style="font-weight:700">${f.name}${f.prime?' <span class="prime-badge">P</span>':''}</div><div style="font-size:.7rem;color:var(--sub)">${f.weight} · ${'★'.repeat(f.stars)}</div></div><div style="text-align:right"><div style="font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--gold)">${survivalState.wins}</div><div style="font-size:.68rem;color:var(--sub)">Siege · Rekord: ${record}</div></div></div><div style="font-size:.63rem;color:var(--sub);margin-bottom:4px">HP: ${hp}/${survivalState.maxHp}</div><div style="height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;margin-bottom:12px"><div style="width:${hpPct}%;height:100%;background:${hpC};border-radius:4px;transition:width .4s"></div></div>${survivalState.lastResult?`<div style="border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:8px;margin-bottom:10px;font-size:.8rem">${survivalState.lastResult}</div>`:''}<div style="font-size:.78rem;color:var(--sub);margin-bottom:8px">Nächster: <b style="color:white">${survivalState.nextOpp?.name}</b> ${'★'.repeat(survivalState.nextOpp?.stars||0)}</div><div style="display:flex;gap:8px"><button class="btn btn-r" style="flex:1;padding:11px" onclick="survivalFight()">⚔️ KÄMPFEN</button><button class="btn btn-gh" style="padding:11px 14px;flex:unset" onclick="survivalState=null;renderSurvivalContent()">✕</button></div></div>`;}
function startSurvival(){const sel=document.getElementById('survSel');const[n,w]=(sel?.value||fighters[0].name+'||'+fighters[0].weight).split('||');const f=fighters.find(x=>x.name===n&&x.weight===w)||fighters[0];const mH=100+f.stars*20+(f.prime?50:0);survivalState={fighter:f,hp:mH,maxHp:mH,wins:0,nextOpp:rand(fighters.filter(x=>x.name!==f.name)),lastResult:null};renderSurvivalContent();}
function survivalFight(){if(!survivalState)return;const f=survivalState.fighter,opp=survivalState.nextOpp;const{winner,method}=runFight(f,opp);const won=winner.name===f.name;const dmg=won?Math.floor(Math.random()*10+3):Math.floor(Math.random()*25+15);if(!won)survivalState.hp-=dmg;if(won){survivalState.wins++;survivalState.hp=Math.min(survivalState.maxHp,survivalState.hp+Math.floor(Math.random()*8+2));}const rec=parseInt(localStorage.getItem('sRec')||'0');if(survivalState.wins>rec)localStorage.setItem('sRec',''+survivalState.wins);fightHist.unshift('[SURVIVAL] '+f.name+' vs '+opp.name+' → '+(won?'WIN':'LOSS')+' ('+method+')');recordRivalry(f.name,opp.name,won);if(survivalState.hp<=0){const rw=survivalState.wins*50;if(rw>0){coins+=rw;updateTopbar();}const w2=survivalState.wins;survivalState=null;toast(`💀 Ende: ${w2} Siege${rw?' +'+rw+'🪙':''}`,rw?'gold':'red');saveUser();checkAchievements();renderSurvivalContent();return;}survivalState.lastResult=won?`<span style="color:#22c55e">✅ Sieg vs ${opp.name} (${method})</span>`:`<span style="color:var(--sub)">⚠️ Niederlage vs ${opp.name} <span style="color:var(--red)">-${dmg} HP</span></span>`;survivalState.nextOpp=rand(fighters.filter(x=>x.name!==f.name));renderSurvivalContent();}

">Kein ${w} Fighter</div>`}</div>`;}).join('');}
function challengeTitle(w){const sel=document.getElementById('cs_'+w.replace(/ /g,'_'));const pf=myCol.filter(f=>f.weight===w);const playerF=pf[parseInt(sel?.value||0)];if(!playerF)return;const data=championships[w];const{winner,method}=runFight(playerF,data.champ);const won=winner.name===playerF.name;recordRivalry(playerF.name,data.champ.name,won);fightHist.unshift('[CHAMP] '+playerF.name+' vs '+data.champ.name+' ('+w+') → '+(won?'CHAMPION!':'LOSS'));if(won){championships[w]={champ:JSON.parse(JSON.stringify(playerF)),defenses:0,isPlayer:true,challenger:rand(fBW[w].filter(f=>f.name!==playerF.name))};coins+=300;addNotif('🏆','Neuer Champion!',`${playerF.name} ist jetzt ${w} Champion!`);toast(`🏆 ${w} Champion! +300🪙`,'gold');}else{toast(`💀 Niederlage gegen ${data.champ.name}!`,'red');}updateTopbar();saveUser();checkAchievements();renderChampContent();}
function defendTitle(w){const data=championships[w];if(!data.isPlayer)return;const challenger=data.challenger||rand(fBW[w]);const{winner,method}=runFight(data.champ,challenger);const won=winner.name===data.champ.name;recordRivalry(data.champ.name,challenger.name,won);fightHist.unshift('[DEFENSE] '+data.champ.name+' vs '+challenger.name+' → '+(won?'DEFENDED':'LOST'));if(won){data.defenses++;coins+=30;data.challenger=rand(fBW[w].filter(f=>f.name!==data.champ.name));toast(`Verteidigt! +30🪙 · ${data.defenses}x`,'gold');}else{championships[w]={champ:JSON.parse(JSON.stringify(challenger)),defenses:0,isPlayer:false,challenger:null};addNotif('💀','Titel verloren!',`${w} Titel an ${challenger.name} verloren!`);toast(`💀 Titel an ${challenger.name} verloren!`,'red');}updateTopbar();saveUser();checkAchievements();renderChampContent();}

let upgradeFilter='',fusionSlot=[null,null];
function renderCardsPage(tab){

function renderCollection(){

function sellF(i){const f=myCol.splice(i,1)[0];const v=f.prime?500:f.stars===6?400:f.stars===5?250:f.stars===4?150:f.stars===3?100:50;coins+=v;toast(`${f.name} für +${v}🪙 verkauft`,'green');updateTopbar();saveUser();checkAchievements();renderCardsPage(0);}

function renderPacks(){return`<div class="sec-title">OPEN <span>PACKS</span></div><div class="sec-sub">Kostenlos – eine pro Gewichtsklasse</div><div class="packs-grid">${weights.map(w=>`<div class="pack-card" onclick="openPack('${w}')"><div style="font-size:2.2rem;margin-bottom:8px">📦</div><div style="font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:2px">${w}</div><div style="font-size:.72rem;color:var(--gold);margin-top:3px;font-weight:700">FREE</div></div>`).join('')}</div>`;}

function renderUpgrade(){const COSTS=[0,200,400,700,1200];if(!myCol.length)return`<div class="sec-title">⭐ UPGRADE</div><div class="empty"><div class="icon">⭐</div><p>Keine Fighter!</p></div>`;return`<div class="sec-title">⭐ FIGHTER <span>UPGRADE</span></div><div style="background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.2);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:.78rem;color:var(--sub)">💡 LV1→2: 200🪙 · LV2→3: 400🪙 · LV3→4: 700🪙 · LV4→5: 1200🪙 · Jedes LV: alle Stats <b style="color:white">+3</b></div>`+[...myCol].sort((a,b)=>b.stars-a.stars).map(f=>{const idx=myCol.indexOf(f);const lv=f.level||1;const maxed=lv>=5;const cost=maxed?0:COSTS[lv-1];const can=coins>=cost;const pct=((lv-1)/4)*100;return`<div style="background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px"><div><div style="font-weight:700;font-size:.9rem">${f.name} <span class="lvl-badge">LV${lv}</span>${f.prime?' <span class="prime-badge">P</span>':''}</div><div class="f-meta">${f.weight} · ${'★'.repeat(f.stars)}</div></div>${maxed?'<div style="color:var(--gold);font-size:.78rem;font-weight:700">✨ MAX</div>':`<button class="btn ${can?'btn-g':'btn-gh'}" style="padding:6px 12px;font-size:.75rem;flex:unset" onclick="doUpgrade(${idx})" ${can?'':'disabled'}>LV${lv+1} · ${cost}🪙</button>`}</div><div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><div style="font-size:.6rem;color:var(--sub)">1</div><div style="flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${maxed?'var(--gold)':'var(--red)'};border-radius:3px"></div></div><div style="font-size:.6rem;color:var(--sub)">5</div></div>${renderStatBars(f.stats)}</div>`;}).join('');}
const UPGRADE_COSTS=[0,200,400,700,1200];
function doUpgrade(idx){const f=myCol[idx];const lv=f.level||1;if(lv>=5){toast('Max Level!','red');return;}const cost=UPGRADE_COSTS[lv-1];if(coins<cost){toast('Nicht genug Coins!','red');return;}coins-=cost;f.level=lv+1;f.upgrades=(f.upgrades||0)+1;statKeys.forEach(k=>{f.stats[k]=Math.min(99,(f.stats[k]||70)+3);});toast(`${f.name} → LV${f.level}! Alle Stats +3`,'gold');updateTopbar();saveUser();checkAchievements();renderCardsPage(2);}

// CARD FUSION
function renderFusion(){return`<div class="sec-title">🃏 CARD <span>FUSION</span></div><div class="sec-sub">Kombiniere 2 Fighter zu einem stärkeren – beide Karten werden verbraucht!</div><div style="background:rgba(168,85,247,.06);border:1px solid rgba(168,85,247,.2);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:.78rem;color:var(--sub)">💡 Fusion Regeln: Gleiche Gewichtsklasse · Neuer Fighter = Sterne von Karte A · Stats werden gemittelt und +10% Bonus</div><div class="fusion-slots"><div class="fusion-slot${fusionSlot[0]?' filled':''}" onclick="openFusionPick(0)">${fusionSlot[0]?`<div style="font-weight:700;font-size:.85rem;margin-bottom:2px">${fusionSlot[0].name}</div><div style="color:var(--gold);font-size:.8rem">${'★'.repeat(fusionSlot[0].stars)}</div><div style="font-size:.68rem;color:var(--sub)">${fusionSlot[0].weight}</div><button onclick="event.stopPropagation();fusionSlot[0]=null;renderCardsPage(3)" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:.8rem;margin-top:4px">✕</button>`:'<div style="font-size:1.5rem;margin-bottom:4px">➕</div><div style="font-size:.78rem;color:var(--sub)">Fighter A</div>'}</div><div class="fusion-plus">${fusionSlot[0]&&fusionSlot[1]?'⚡':'+'}</div><div class="fusion-slot${fusionSlot[1]?' filled':''}" onclick="openFusionPick(1)">${fusionSlot[1]?`<div style="font-weight:700;font-size:.85rem;margin-bottom:2px">${fusionSlot[1].name}</div><div style="color:var(--gold);font-size:.8rem">${'★'.repeat(fusionSlot[1].stars)}</div><div style="font-size:.68rem;color:var(--sub)">${fusionSlot[1].weight}</div><button onclick="event.stopPropagation();fusionSlot[1]=null;renderCardsPage(3)" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:.8rem;margin-top:4px">✕</button>`:'<div style="font-size:1.5rem;margin-bottom:4px">➕</div><div style="font-size:.78rem;color:var(--sub)">Fighter B</div>'}</div></div>${fusionSlot[0]&&fusionSlot[1]?renderFusionPreview():''}`;}
function openFusionPick(slot){const el=document.getElementById('mainContent');const pool=myCol.filter(f=>!fusionSlot.includes(f));if(!pool.length){toast('Nicht genug Fighter!','red');return;}el.innerHTML+=`<div id="fusionPickModal" style="position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:4000;display:flex;align-items:flex-end;padding:16px"><div style="background:#0f0f1a;border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-height:60vh;overflow-y:auto;padding:16px"><div style="font-family:'Bebas Neue',sans-serif;letter-spacing:3px;font-size:1rem;margin-bottom:12px;display:flex;justify-content:space-between">FIGHTER WÄHLEN <button onclick="document.getElementById('fusionPickModal').remove()" style="background:none;border:none;color:var(--sub);cursor:pointer">✕</button></div>${pool.map((f,i)=>`<div class="fighter-card" onclick="pickFusion(${slot},${myCol.indexOf(f)});document.getElementById('fusionPickModal').remove()"><div class="fighter-info-left"><div class="f-name">${f.name}</div><div class="f-meta">${f.weight} · ${'★'.repeat(f.stars)}</div></div></div>`).join('')}</div></div>`;}
function pickFusion(slot,idx){fusionSlot[slot]=myCol[idx];renderCardsPage(3);}
function renderFusionPreview(){const a=fusionSlot[0],b=fusionSlot[1];if(a.weight!==b.weight)return`<div style="background:rgba(229,9,20,.08);border:1px solid rgba(229,9,20,.2);border-radius:10px;padding:14px;text-align:center"><div style="color:var(--red);font-weight:700">⚠️ Verschiedene Gewichtsklassen!</div><div style="font-size:.78rem;color:var(--sub);margin-top:4px">Fusion nur innerhalb der gleichen Klasse möglich</div></div>`;const newStats={};statKeys.forEach(k=>{newStats[k]=Math.min(99,Math.round(((a.stats[k]||70)+(b.stats[k]||70))/2*1.1));});const newStars=Math.min(6,a.stars+(b.stars>=4?1:0));const isPrime=a.prime&&b.prime;return`<div style="background:rgba(168,85,247,.06);border:1px solid rgba(168,85,247,.3);border-radius:12px;padding:14px;margin-top:14px"><div style="font-size:.68rem;letter-spacing:3px;color:var(--sub);margin-bottom:8px">FUSION-ERGEBNIS</div><div style="text-align:center;margin-bottom:10px"><div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--purple)">${a.name.split(' ')[0]} × ${b.name.split(' ')[0]}</div><div style="color:var(--gold)">${'★'.repeat(newStars)} ${newStars>a.stars?'⬆️ UPGRADE!':''} ${isPrime?'<span class="prime-badge">PRIME</span>':''}</div><div style="font-size:.72rem;color:var(--sub)">${a.weight} · Stats: +10% Fusion Bonus</div></div>${renderStatBars(newStats)}<button class="btn-pu btn" style="width:100%;padding:11px;letter-spacing:2px;margin-top:12px" onclick="doFusion()">⚡ FUSION AUSFÜHREN</button></div>`;}
function doFusion(){const a=fusionSlot[0],b=fusionSlot[1];if(!a||!b||a.weight!==b.weight){toast('Gleiche Gewichtsklasse!','red');return;}const newStats={};statKeys.forEach(k=>{newStats[k]=Math.min(99,Math.round(((a.stats[k]||70)+(b.stats[k]||70))/2*1.1));});const newStars=Math.min(6,a.stars+(b.stars>=4?1:0));const isPrime=a.prime&&b.prime;const newFighter={name:`${a.name.split(' ')[0]}×${b.name.split(' ')[0]}`,weight:a.weight,stars:newStars,prime:isPrime,stats:newStats,level:Math.max(a.level||1,b.level||1),upgrades:0};myCol=myCol.filter(f=>f!==a&&f!==b);myCol.push(newFighter);fusionSlot=[null,null];showPackResult(newFighter);toast(`⚡ Fusion erfolgreich! ${newFighter.name} erstellt`,'purple');updateTopbar();saveUser();checkAchievements();}

// REACTION GAME
let rxState={round:0,hits:0,times:[],active:false,t1:null,t2:null};
function initReactionGame(){
  const el=document.getElementById('miniGameContent');
  el.innerHTML=`<div style="text-align:center">
    <div style="display:flex;justify-content:space-around;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center"><div style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--gold)" id="rxRound">0/5</div><div style="font-size:.6rem;color:var(--sub)">RUNDE</div></div>
      <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center"><div style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:#22c55e" id="rxHits">0</div><div style="font-size:.6rem;color:var(--sub)">HITS</div></div>
      <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:center"><div style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--red)" id="rxAvg">-</div><div style="font-size:.6rem;color:var(--sub)">Ø MS</div></div>
    </div>
    <div id="reactionCircle" onclick="rxClick()">WARTE...</div>
    <div id="rxMsg" style="font-size:.82rem;color:var(--sub);min-height:22px;margin-bottom:10px"></div>
    <div id="rxTimes" style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:12px"></div>
    <button class="btn btn-r" id="rxStartBtn" onclick="startRx()" style="padding:11px 32px;letter-spacing:2px">⚡ START</button>
    <div id="rxReward" style="display:none;margin-top:14px;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2);border-radius:12px;padding:16px">
      <div id="rxRText" style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--gold);letter-spacing:3px"></div>
      <div id="rxRSub" style="font-size:.78rem;color:var(--sub);margin-top:3px"></div>
    </div>
  </div>`;}
function startRx(){rxState={round:0,hits:0,times:[],active:false,t1:null,t2:null};document.getElementById('rxStartBtn').style.display='none';document.getElementById('rxReward').style.display='none';document.getElementById('rxTimes').innerHTML='';rxNextRound();}
function rxNextRound(){if(rxState.round>=5){rxEnd();return;}rxState.round++;rxState.active=false;const c=document.getElementById('reactionCircle');if(!c)return;c.className='';c.textContent='BEREIT...';document.getElementById('rxRound').textContent=rxState.round+'/5';document.getElementById('rxMsg').textContent='';const d=1200+Math.random()*2500;rxState.t2=setTimeout(()=>{if(!document.getElementById('reactionCircle'))return;c.className='ready';c.textContent='JETZT!';rxState.active=true;rxState.startTime=Date.now();rxState.t1=setTimeout(()=>{if(rxState.active){rxState.active=false;c.className='early';c.textContent='ZU SPÄT!';document.getElementById('rxMsg').textContent='Zu langsam!';addRxTag(null);setTimeout(rxNextRound,1000);}},1200);},d);}
function rxClick(){if(rxState.round===0)return;if(!rxState.active){clearTimeout(rxState.t2);const c=document.getElementById('reactionCircle');if(!c)return;c.className='early';c.textContent='ZU FRÜH!';document.getElementById('rxMsg').textContent='Zu früh gedrückt!';addRxTag(null);rxState.active=false;setTimeout(rxNextRound,900);return;}clearTimeout(rxState.t1);rxState.active=false;const ms=Date.now()-rxState.startTime;rxState.times.push(ms);rxState.hits++;const c=document.getElementById('reactionCircle');c.className='hit';c.textContent=ms+'ms';document.getElementById('rxHits').textContent=rxState.hits;const avg=Math.round(rxState.times.reduce((a,b)=>a+b,0)/rxState.times.length);document.getElementById('rxAvg').textContent=avg;addRxTag(ms);setTimeout(rxNextRound,800);}
function addRxTag(ms){const w=document.getElementById('rxTimes');if(!w)return;const t=document.createElement('div');t.style.cssText=`padding:3px 8px;border-radius:5px;font-size:.72rem;font-weight:700;background:${ms?'rgba(34,197,94,.15)':'rgba(229,9,20,.15)'};border:1px solid ${ms?'rgba(34,197,94,.3)':'rgba(229,9,20,.3)'};color:${ms?'#22c55e':'var(--red)'}`;t.textContent=ms?ms+'ms':'✗';w.appendChild(t);}
function rxEnd(){const c=document.getElementById('reactionCircle');if(c){c.textContent='FERTIG!';c.className='';}const avg=rxState.times.length?Math.round(rxState.times.reduce((a,b)=>a+b,0)/rxState.times.length):999;let rw=rxState.hits>=5?300:rxState.hits>=4?200:rxState.hits>=3?120:rxState.hits>=2?60:rxState.hits>=1?20:0;if(avg<200&&rxState.hits>=4)rw+=100;if(rw>0){coins+=rw;updateTopbar();saveUser();}const rb=document.getElementById('rxReward'),rt=document.getElementById('rxRText'),rs=document.getElementById('rxRSub'),rsb=document.getElementById('rxStartBtn');if(rb)rb.style.display='block';if(rt)rt.textContent=`${rxState.hits}/5 Hits → +${rw}🪙`;if(rs)rs.textContent=avg<999?`Ø ${avg}ms`:'Weiter üben!';if(rsb)rsb.style.display='inline-flex';toast(`Reaction: ${rxState.hits}/5 Hits, +${rw}🪙`,'gold');checkAchievements();}

// PUNCH TIMING GAME
let punchState={round:0,score:0,active:false,animId:null,pos:0,dir:1,speed:2};
function initPunchGame(){
  const el=document.getElementById('miniGameContent');
  el.innerHTML=`<div style="text-align:center">
    <div style="font-size:.78rem;color:var(--sub);margin-bottom:4px">Drücke PUNCH wenn der Cursor auf dem grünen Sweet Spot ist!</div>
    <div style="display:flex;justify-content:space-around;margin-bottom:14px;flex-wrap:wrap;gap:6px">
      <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:8px 14px;text-align:center"><div style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--gold)" id="pRound">0/8</div><div style="font-size:.6rem;color:var(--sub)">RUNDE</div></div>
      <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:8px 14px;text-align:center"><div style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:#22c55e" id="pScore">0</div><div style="font-size:.6rem;color:var(--sub)">PUNKTE</div></div>
      <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:8px 14px;text-align:center"><div style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--red)" id="pMult">x1</div><div style="font-size:.6rem;color:var(--sub)">MULTI</div></div>
    </div>
    <div style="margin-bottom:8px;font-size:.82rem;font-weight:700" id="pMsg">Drücke START</div>
    <div id="punchBar" style="margin:0 auto 14px;max-width:360px;cursor:pointer" onclick="punchHit()">
      <div class="sweet" id="pSweet"></div>

    </div>
    <div id="pHitMsg" style="font-size:1.1rem;font-weight:700;min-height:28px;margin-bottom:10px"></div>
    <button class="btn btn-r" id="pStartBtn" onclick="startPunch()" style="padding:11px 32px;letter-spacing:2px">🥊 START</button>
    <div id="pReward" style="display:none;margin-top:14px;background:rgba(229,9,20,.08);border:1px solid rgba(229,9,20,.2);border-radius:12px;padding:16px">
      <div id="pRText" style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--gold);letter-spacing:3px"></div>
      <div id="pRSub" style="font-size:.78rem;color:var(--sub);margin-top:3px"></div>
    </div>
  </div>`;}
function startPunch(){punchState={round:0,score:0,active:false,animId:null,pos:0,dir:1,speed:1.5,streak:0,multiplier:1};document.getElementById('pStartBtn').style.display='none';document.getElementById('pReward').style.display='none';document.getElementById('pHitMsg').textContent='';punchNextRound();}
function punchNextRound(){if(punchState.round>=8){punchEnd();return;}punchState.round++;punchState.active=true;punchState.pos=0;punchState.dir=1;punchState.speed=Math.min(4,1.5+punchState.round*.25);// Place sweet spot randomly
const bar=document.getElementById('punchBar'),sw=document.getElementById('pSweet');if(!bar||!sw)return;const bp=10+Math.floor(Math.random()*60);const bw=15-punchState.round;sw.style.left=bp+'%';sw.style.width=Math.max(6,bw)+'%';document.getElementById('pRound').textContent=punchState.round+'/8';document.getElementById('pMsg').textContent='PUNCH!';document.getElementById('pMult').textContent='x'+punchState.multiplier;punchAnimate();}
function punchAnimate(){if(!punchState.active)return;punchState.pos+=punchState.dir*punchState.speed;if(punchState.pos>=100){punchState.pos=100;punchState.dir=-1;}else if(punchState.pos<=0){punchState.pos=0;punchState.dir=1;}const cur=document.getElementById('pCursor');if(cur)cur.style.left=punchState.pos+'%';punchState.animId=requestAnimationFrame(punchAnimate);}
function punchHit(){if(!punchState.active)return;cancelAnimationFrame(punchState.animId);punchState.active=false;const bar=document.getElementById('punchBar'),sw=document.getElementById('pSweet'),hm=document.getElementById('pHitMsg');if(!bar||!sw||!hm)return;const swL=parseFloat(sw.style.left),swW=parseFloat(sw.style.width),hit=punchState.pos>=swL&&punchState.pos<=swL+swW;if(hit){punchState.streak++;punchState.multiplier=Math.min(4,1+Math.floor(punchState.streak/2));const pts=100*punchState.multiplier;punchState.score+=pts;hm.textContent=`💥 TREFFER! +${pts} (x${punchState.multiplier})`;hm.style.color='#22c55e';}else{punchState.streak=0;punchState.multiplier=1;hm.textContent=`❌ Daneben! (${Math.round(punchState.pos)}% vs ${Math.round(swL)}-${Math.round(swL+swW)}%)`;hm.style.color='var(--red)';}document.getElementById('pScore').textContent=punchState.score;document.getElementById('pMult').textContent='x'+punchState.multiplier;setTimeout(punchNextRound,900);}
function punchEnd(){const rw=Math.floor(punchState.score/10);if(rw>0){coins+=rw;updateTopbar();saveUser();}const rb=document.getElementById('pReward'),rt=document.getElementById('pRText'),rs=document.getElementById('pRSub'),sb=document.getElementById('pStartBtn');if(rb)rb.style.display='block';if(rt)rt.textContent=`Score: ${punchState.score} → +${rw}🪙`;if(rs)rs.textContent=`Bester Streak: ${punchState.streak}x`;if(sb)sb.style.display='inline-flex';document.getElementById('pMsg').textContent='FERTIG!';toast(`Punch Game: ${punchState.score} Punkte, +${rw}🪙`,'gold');}

// SPIN WHEEL
const W_SEGS=[{label:'+100🪙',coins:100,color:'#c0392b',type:'coins'},{label:'+250🪙',coins:250,color:'#1a237e',type:'coins'},{label:'+50🪙',coins:50,color:'#4a1942',type:'coins'},{label:'FREE PACK',coins:0,color:'#1b5e20',type:'pack'},{label:'+500🪙',coins:500,color:'#e65100',type:'coins'},{label:'+150🪙',coins:150,color:'#1a237e',type:'coins'},{label:'💀 NICHTS',coins:0,color:'#212121',type:'none'},{label:'🔥 PRIME!',coins:0,color:'#7b4f00',type:'prime'}];
const SC=W_SEGS.length,SA=(Math.PI*2)/SC;
let wAngle=0,wSpinning=false;
function renderSpin(){return`<div class="sec-title">🎰 SPIN <span>WHEEL</span></div><div class="sec-sub">Einmal täglich – Coins oder Fighter!</div><div style="display:flex;flex-direction:column;align-items:center;gap:16px;margin-top:8px"><div style="position:relative;width:280px;height:280px"><div style="position:absolute;top:-16px;left:50%;transform:translateX(-50%);z-index:10;font-size:1.8rem">▼</div><canvas id="wCanvas" width="280" height="280" style="border-radius:50%;display:block"></canvas></div><button class="btn btn-r" id="spinBtnEl" onclick="spinW()" style="padding:12px 40px;font-size:.95rem;letter-spacing:3px">🎰 SPIN</button><div id="spinCDEl" style="font-size:.78rem;color:var(--sub);letter-spacing:2px"></div><div id="spinResEl" style="display:none;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:16px 24px;text-align:center;min-width:220px"><div id="spinIcon" style="font-size:2.5rem;margin-bottom:6px"></div><div id="spinTitle" style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px"></div><div id="spinSub" style="font-size:.78rem;color:var(--sub);margin-top:3px;letter-spacing:2px"></div></div></div>`;}
function drawWheel(a=0){const cv=document.getElementById('wCanvas');if(!cv)return;const ctx=cv.getContext('2d'),cx=140,cy=140,r=135;ctx.clearRect(0,0,280,280);W_SEGS.forEach((s,i)=>{const st=a+i*SA-Math.PI/2,en=st+SA;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,st,en);ctx.closePath();ctx.fillStyle=s.color;ctx.fill();ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=2;ctx.stroke();ctx.save();ctx.translate(cx,cy);ctx.rotate(st+SA/2);ctx.textAlign='right';ctx.fillStyle='#fff';ctx.font='bold 12px Barlow,Arial';ctx.shadowColor='rgba(0,0,0,.8)';ctx.shadowBlur=3;ctx.fillText(s.label,r-10,4);ctx.restore();});ctx.beginPath();ctx.arc(cx,cy,20,0,Math.PI*2);ctx.fillStyle='#0a0a0f';ctx.fill();ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#fff';ctx.font='bold 10px Barlow,Arial';ctx.textAlign='center';ctx.fillText('UFC',cx,cy+3);}
function checkSpinCD(){const ls=localStorage.getItem('ufcSpin'),b=document.getElementById('spinBtnEl'),c=document.getElementById('spinCDEl');if(!ls){if(b){b.disabled=false;b.style.opacity='1';}if(c)c.textContent='Du hast einen freien Spin!';return;}const diff=Date.now()-parseInt(ls),day=24*60*60*1000;if(diff>=day){if(b){b.disabled=false;b.style.opacity='1';}if(c)c.textContent='Freier Spin verfügbar!';}else{if(b){b.disabled=true;b.style.opacity='.5';}const rem=day-diff,h=Math.floor(rem/3600000),m=Math.floor((rem%3600000)/60000);if(c)c.textContent=`Nächster Spin in ${h}h ${m}m`;}}
function spinW(){if(wSpinning)return;wSpinning=true;const b=document.getElementById('spinBtnEl');if(b){b.disabled=true;b.style.opacity='.5';}const sr=document.getElementById('spinResEl');if(sr)sr.style.display='none';const winIdx=Math.floor(Math.random()*SC),win=W_SEGS[winIdx];const extra=(6+Math.floor(Math.random()*4))*Math.PI*2;const cur=((wAngle%(Math.PI*2))+Math.PI*2)%(Math.PI*2);const tgt=((-winIdx*SA-SA/2)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);let delta=tgt-cur;if(delta<=0)delta+=Math.PI*2;const endA=wAngle+extra+delta,dur=4000,startA=wAngle,startT=performance.now();function ease(t){return 1-Math.pow(1-t,4);}function anim(now){const el=now-startT,t=Math.min(el/dur,1);wAngle=startA+(endA-startA)*ease(t);drawWheel(wAngle);if(t<1)requestAnimationFrame(anim);else{wSpinning=false;localStorage.setItem('ufcSpin',''+Date.now());showSpinResult(win);checkSpinCD();}}requestAnimationFrame(anim);}
function showSpinResult(win){const sr=document.getElementById('spinResEl'),icon=document.getElementById('spinIcon'),title=document.getElementById('spinTitle'),sub=document.getElementById('spinSub');if(win.type==='coins'){coins+=win.coins;icon.textContent='🪙';title.textContent='+'+win.coins+' COINS';title.style.color='var(--gold)';sub.textContent='Hinzugefügt!';toast(`+${win.coins}🪙 Spin!`,'gold');}else if(win.type==='pack'){const w=rand(weights),f=JSON.parse(JSON.stringify(rand(fBW[w])));f.level=1;f.upgrades=0;myCol.push(f);icon.textContent='📦';title.textContent='FREE PACK!';title.style.color='#22c55e';sub.textContent=f.name;toast(`Pack: ${f.name}`,'green');}else if(win.type==='prime'){const f=JSON.parse(JSON.stringify(rand(fighters.filter(f=>f.prime))));f.level=1;f.upgrades=0;myCol.push(f);icon.textContent='🔥';title.textContent='PRIME!';title.style.color='var(--gold)';sub.textContent=f.name;toast(`PRIME: ${f.name}!`,'gold');}else{icon.textContent='💀';title.textContent='NICHTS...';title.style.color='var(--sub)';sub.textContent='Nächstes Mal!';toast('Diesmal nichts...','');}if(sr)sr.style.display='block';updateTopbar();saveUser();checkAchievements();}

// QUIZ
let quiz=null;
function renderQuiz(){const h=`<div class="sec-title">🎯 <span>QUIZ</span></div><div class="sec-sub">3 Fragetypen · Streak Bonus · +30🪙/Antwort</div><div id="quizCont"><div style="text-align:center;padding:28px"><button class="btn btn-r" style="padding:12px 32px;letter-spacing:2px" onclick="startQuiz();renderQuizQ()">🎯 QUIZ STARTEN</button></div></div>`;return h;}
function startQuiz(){quiz={q:0,total:10,correct:0,streak:0,maxStreak:0,done:false,reward:0};renderQuizQ();}
function renderQuizQ(){const el=document.getElementById('quizCont');if(!el)return;if(!quiz)return;if(quiz.done){el.innerHTML=`<div style="text-align:center;padding:28px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:14px"><div style="font-size:3.5rem;margin-bottom:8px">${quiz.correct>=8?'🧠':quiz.correct>=5?'👍':'😅'}</div><div style="font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:3px;margin-bottom:4px">${quiz.correct}/10 RICHTIG</div><div style="color:var(--gold);font-weight:700;font-size:1rem;margin-bottom:4px">+${quiz.reward}🪙</div><div style="color:var(--sub);font-size:.78rem;margin-bottom:16px">Best Streak: ${quiz.maxStreak} 🔥</div><button class="btn btn-r" style="padding:11px 32px;letter-spacing:2px" onclick="startQuiz();renderQuizQ()">NOCHMAL</button></div>`;return;}const types=['weight','stars','prime'];const qtype=types[Math.floor(Math.random()*3)];const f=rand(fighters);quiz.current=f;quiz.qtype=qtype;let q='',opts=[],correct='';if(qtype==='weight'){q=`In welcher Gewichtsklasse kämpft <b>${f.name}</b>?`;correct=f.weight;opts=[f.weight,...weights.filter(w=>w!==f.weight).sort(()=>Math.random()-.5).slice(0,3)].sort(()=>Math.random()-.5);}else if(qtype==='stars'){q=`Wie viele ★ hat <b>${f.name}</b>?`;correct=String(f.stars);opts=[f.stars,...[1,2,3,4,5,6].filter(s=>s!==f.stars).sort(()=>Math.random()-.5).slice(0,3)].map(String).sort(()=>Math.random()-.5);}else{q=`Ist <b>${f.name}</b> eine PRIME-Karte?`;correct=f.prime?'Ja':'Nein';opts=['Ja','Nein'];}const bp=30+(quiz.streak>=3?quiz.streak*5:0);el.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px"><div style="font-size:.78rem;color:var(--sub)">F ${quiz.q+1}/10</div><div style="color:var(--gold);font-weight:700">+${bp}🪙</div>${quiz.streak>1?`<div style="color:var(--red);font-weight:700;font-size:.82rem">🔥 ${quiz.streak}x</div>`:''}</div><div style="background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center;margin-bottom:12px"><div style="font-size:.95rem;line-height:1.5;margin-bottom:6px">${q}</div><div style="color:var(--gold)">${'★'.repeat(f.stars)}</div>${f.prime?'<div class="prime-badge" style="margin-top:5px">PRIME</div>':''}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${opts.map(o=>`<button class="btn btn-o" style="padding:13px;font-size:.82rem" onclick="ansQ('${o}')">${o}</button>`).join('')}</div>`;}
function ansQ(c){if(!quiz||quiz.done)return;const f=quiz.current,correct=quiz.qtype==='stars'?String(f.stars):quiz.qtype==='prime'?(f.prime?'Ja':'Nein'):f.weight;const bp=30+(quiz.streak>=3?quiz.streak*5:0);if(c===correct){quiz.correct++;quiz.streak++;quiz.maxStreak=Math.max(quiz.maxStreak,quiz.streak);quiz.reward+=bp;toast(`✅ Richtig! +${bp}🪙`,'green');}else{quiz.streak=0;toast(`❌ Falsch! Antwort: ${correct}`,'red');}quiz.q++;if(quiz.q>=quiz.total){quiz.done=true;coins+=quiz.reward;updateTopbar();saveUser();checkAchievements();}setTimeout(()=>{if(quiz&&!quiz.done)renderQuizQ();else{const el=document.getElementById('quizCont');if(el&&quiz&&quiz.done)renderQuizQ();}},600);}

// TRADE
let tradeOff=null;
function renderTrade(){return`<div class="sec-title">🔀 <span>TRADER</span></div><div class="sec-sub">Tausche Fighter gegen Bot-Angebote</div><div id="tradeCont"></div>`;}
function renderTradeContent(){const el=document.getElementById('tradeCont');if(!el)return;if(!myCol.length){el.innerHTML='<div class="empty"><div class="icon">🔀</div><p>Keine Fighter!</p></div>';return;}el.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><div><div style="font-size:.7rem;color:var(--sub);letter-spacing:2px;margin-bottom:6px">DEIN FIGHTER</div><select id="tSel" style="width:100%;margin-bottom:8px">${[...myCol].sort((a,b)=>b.stars-a.stars).map((f,i)=>`<option value="${myCol.indexOf(f)}">${f.name} (${'★'.repeat(f.stars)})</option>`).join('')}</select><button class="btn btn-o" style="width:100%;padding:9px;font-size:.78rem" onclick="genOffer()">🔀 ANGEBOT</button></div><div><div style="font-size:.7rem;color:var(--sub);letter-spacing:2px;margin-bottom:6px">BOT BIETET</div>${tradeOff?`<div class="fighter-card${tradeOff.prime?' prime':''}"><div><div class="f-name">${tradeOff.name}</div><div class="f-meta">${tradeOff.weight}</div></div><span class="stars">${'★'.repeat(tradeOff.stars)}</span></div><button class="btn btn-g" style="width:100%;padding:8px;font-size:.78rem;margin-bottom:6px" onclick="acceptTrade()">✅ AKZEPTIEREN</button><button class="btn btn-gh" style="width:100%;padding:7px;font-size:.75rem" onclick="genOffer()">🔄 Reroll</button>`:`<div style="color:var(--sub);font-size:.82rem;padding:16px;text-align:center;border:1px dashed var(--border);border-radius:10px">Angebot anfordern</div>`}</div></div>`;}
function rollPack(pool){const r=Math.random()*100;let f;if(r<2)f=pool.filter(x=>x.prime);else if(r<5)f=pool.filter(x=>x.stars===5&&!x.prime);else if(r<25)f=pool.filter(x=>x.stars===4&&!x.prime);else f=pool.filter(x=>x.stars<=3&&!x.prime);if(!f||!f.length)f=pool;return rand(f);}
function genOffer(){const sel=document.getElementById('tSel');const mf=myCol[parseInt(sel?.value||0)];const pool=(fBW[mf.weight]||fighters).filter(f=>f.name!==mf.name);tradeOff=JSON.parse(JSON.stringify(rollPack(pool)));tradeOff.level=1;tradeOff.upgrades=0;renderTradeContent();}
function acceptTrade(){const sel=document.getElementById('tSel');const idx=parseInt(sel?.value||0);const mf=myCol[idx];myCol.splice(idx,1);myCol.push(tradeOff);toast(`Getauscht: ${mf.name} → ${tradeOff.name}!`,tradeOff.prime?'gold':'green');tradeOff=null;updateTopbar();saveUser();renderTradeContent();}

let mListings=[];

function buyPack(st){const c=st===4?500:1000;if(coins<c){toast('Nicht genug Coins!','red');return;}coins-=c;const pool=fighters.filter(f=>f.stars>=st&&!f.prime);const f=JSON.parse(JSON.stringify(rand(pool)));f.level=1;f.upgrades=0;myCol.push(f);showPackResult(f);updateTopbar();saveUser();checkAchievements();}
function buyPrime(){if(coins<2500){toast('Nicht genug Coins!','red');return;}coins-=2500;const f=JSON.parse(JSON.stringify(rand(fighters.filter(f=>f.prime))));f.level=1;f.upgrades=0;myCol.push(f);showPackResult(f);updateTopbar();saveUser();}
function openPack(w){const pool=fBW[w].filter(f=>!f.prime);const f=JSON.parse(JSON.stringify(rollPack(pool)));f.level=1;f.upgrades=0;myCol.push(f);showPackResult(f);updateTopbar();saveUser();checkAchievements();}

function refreshMarket(){mListings=[];[...fighters].sort(()=>Math.random()-.5).slice(0,12).forEach(f=>{const base=f.prime?2800:f.stars===6?1500:f.stars===5?900:f.stars===4?400:f.stars===3?200:80;mListings.push({fighter:JSON.parse(JSON.stringify(f)),price:Math.round(base*(.8+Math.random()*.5)/10)*10,seller:'Bot-'+Math.floor(Math.random()*999)});});}

let scratchDone=false;
function showPackResult(f){
  const ov=document.getElementById('packOverlay'),p1=document.getElementById('packPhase1'),p2=document.getElementById('packPhase2'),p3=document.getElementById('packPhase3');
  p1.style.display='flex';p2.style.display='none';p3.style.display='none';scratchDone=false;ov.classList.add('show');
  const ip=f.prime;
  document.getElementById('scratchStars').textContent=starsStr(f.stars);
  document.getElementById('scratchName').textContent=f.name;document.getElementById('scratchName').style.color=ip?'var(--gold)':'#fff';
  document.getElementById('scratchWeight').textContent=f.weight;document.getElementById('scratchPrime').style.display=ip?'block':'none';
  document.getElementById('scratchUnder').className='scratch-under'+(ip?' prime-under':'');document.getElementById('scratchWrap').className='scratch-wrap'+(ip?' prime-wrap':'');
  document.getElementById('finalStars').textContent=starsStr(f.stars);document.getElementById('finalName').textContent=f.name;document.getElementById('finalName').style.color=ip?'var(--gold)':'#fff';
  document.getElementById('finalWeight').textContent=f.weight;document.getElementById('finalPrime').style.display=ip?'inline-block':'none';
  document.getElementById('finalStats').innerHTML=renderStatBars(f.stats);document.getElementById('finalCard').className='final-card'+(ip?' prime-final':'');document.getElementById('finalCloseBtn').className='final-close-btn'+(ip?' prime-btn':'');
  window._cpf=f;
  setTimeout(()=>{p1.style.display='none';p2.style.display='flex';initScratch(f);},1200);
}
function initScratch(f){
  const old=document.getElementById('scratchCanvas'),nc=old.cloneNode(false);old.parentNode.replaceChild(nc,old);
  const canvas=document.getElementById('scratchCanvas'),ctx=canvas.getContext('2d'),ip=f.prime,W=280,H=280;
  canvas.width=W;canvas.height=H;
  const g=ctx.createLinearGradient(0,0,W,H);if(ip){g.addColorStop(0,'#3a2800');g.addColorStop(1,'#5a3f00');}else{g.addColorStop(0,'#1a0505');g.addColorStop(1,'#2a0a0a');}
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle=ip?'rgba(245,166,35,.12)':'rgba(229,9,20,.12)';
  for(let i=0;i<300;i++){ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H,Math.random()*4+1,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle=ip?'#f5a623':'#e50914';ctx.font='bold 16px Arial';ctx.textAlign='center';ctx.fillText('✦ SCRATCH HERE ✦',W/2,H/2-8);ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='12px Arial';ctx.fillText('drag to reveal',W/2,H/2+14);
  let scratching=false,cnt=0;
  function gp(e){const r=canvas.getBoundingClientRect(),sx=W/r.width,sy=H/r.height,src=e.touches?e.touches[0]:e;return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};}
  function doS(e){e.preventDefault();if(!scratching)return;const p=gp(e);ctx.globalCompositeOperation='destination-out';ctx.beginPath();ctx.arc(p.x,p.y,W*.12,0,Math.PI*2);ctx.fill();cnt++;if(cnt%4===0&&!scratchDone)chkReveal(ctx,f,W,H);}
  canvas.addEventListener('mousedown',e=>{scratching=true;doS(e);});canvas.addEventListener('mousemove',e=>{if(scratching)doS(e);});canvas.addEventListener('mouseup',()=>scratching=false);canvas.addEventListener('mouseleave',()=>scratching=false);canvas.addEventListener('touchstart',e=>{scratching=true;doS(e);},{passive:false});canvas.addEventListener('touchmove',e=>{if(scratching)doS(e);},{passive:false});canvas.addEventListener('touchend',()=>scratching=false);}
function chkReveal(ctx,f,W,H){const d=ctx.getImageData(0,0,W,H).data;let t=0;for(let i=3;i<d.length;i+=4)if(d[i]<128)t++;if(t/(d.length/4)>0.4)triggerFullReveal(f);}
function triggerFullReveal(f){if(scratchDone)return;scratchDone=true;document.getElementById('scratchHint').textContent='';setTimeout(()=>{document.getElementById('packPhase2').style.display='none';document.getElementById('packPhase3').style.display='flex';toast(`${f.name} ${starsStr(f.stars)}`,f.stars>=5||f.prime?'gold':'');},350);}
function closePackOverlay(){document.getElementById('packOverlay').classList.remove('show');}

  const roundNames=["Viertelfinale","Halbfinale","Finale","Großfinale"];
  let html=`<div style="display:flex;justify-content:center;gap:6px;margin-bottom:16px;flex-wrap:wrap">`;
  [1,2,3,4].forEach(r=>{
    const res=results[r-1];
    const bg=res==="win"?"rgba(34,197,94,.2)":res==="loss"?"rgba(229,9,20,.2)":r===round?"rgba(245,166,35,.15)":"rgba(255,255,255,.03)";

  const used=tournState.usedIdx||[];
  const avail=myCol.map((f,i)=>({f,i})).filter(({i})=>!used.includes(i)).sort((a,b)=>b.f.stars-a.f.stars);
  html+=`<div style="background:var(--card-bg);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;margin-bottom:12px">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:3px;color:var(--gold);margin-bottom:3px">${roundNames[round-1]}</div>
    <div style="color:var(--sub);font-size:.78rem;margin-bottom:12px">vs Bot: <b style="color:white">${opp.name}</b> ${"★".repeat(opp.stars)} ${opp.prime?'<span class="prime-badge">P</span>':""} (${opp.weight})</div>
    <div style="font-size:.75rem;color:var(--sub);margin-bottom:10px">Wähle deinen Fighter (jeder nur einmal):</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:7px">`;
  avail.slice(0,8).forEach(({f,i})=>{
    html+=`<div class="fighter-card" style="cursor:pointer" onclick="playTournRound(${i})">
      <div><div class="f-name">${f.name}${(f.level||1)>1?' <span class="lvl-badge">LV'+f.level+'</span>':''}</div><div class="f-meta">${f.weight}</div></div>

    </div>`;
  });

}
function startTournament(){
  if(Date.now()-lastTournTime<TOURN_CD){renderTournamentContent();return;}
  const opps=[...fighters].sort(()=>Math.random()-.5).slice(0,4);
  tournState={round:1,opponents:opps,results:[],done:false,usedIdx:[],prizeCard:null};
  renderTournamentContent();
}
function playTournRound(fi){
  if(!tournState)return;
  const myF=myCol[fi],opp=tournState.opponents[tournState.round-1];
  tournState.usedIdx.push(fi);
  const{winner,method}=runFight(myF,opp);
  const won=winner.name===myF.name;
  tournState.results.push(won?"win":"loss");
  fightHist.unshift(`[TURNIER] ${myF.name} vs ${opp.name} → ${won?"WIN":"LOSS"} (${method})`);
  recordRivalry(myF.name,opp.name,won);
  if(!won||tournState.round===4){
    tournState.done=true;
    if(won){
      lastTournTime=Date.now();
      coins+=500;
      const prime=JSON.parse(JSON.stringify(rand(fighters.filter(f=>f.prime))));
      prime.level=1;prime.upgrades=0;
      myCol.push(prime);
      tournState.prizeCard=prime;
      addNotif("🏆","Turnier gewonnen!",`500🪙 + ${prime.name} (PRIME) gewonnen!`);
      updateTopbar();saveUser();checkAchievements();
    } else {
      lastTournTime=Date.now();
      toast("💀 Ausgeschieden! 2 Min Cooldown.","red");
    }
  } else {
    tournState.round++;
    toast(won?`Runde ${tournState.round-1} gewonnen! Weiter!`:"","green");
  }
  renderTournamentContent();
}

  const el=document.getElementById('predResult');if(!el)return;
