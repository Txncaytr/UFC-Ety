      <div style="text-align:center;flex:1"><div style="font-weight:700;font-size:.88rem">${f2.name}</div><div style="color:var(--sub);font-size:.7rem">${'★'.repeat(f2.stars)}</div></div>
    </div>
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:.7rem;color:var(--sub);margin-bottom:3px"><span>${pct1}%</span><span>SIEGCHANCE</span><span>${pct2}%</span></div>
      <div style="height:12px;border-radius:6px;overflow:hidden;display:flex"><div style="width:${pct1}%;background:var(--red)"></div><div style="width:${pct2}%;background:var(--blue)"></div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px;text-align:center">
      <div style="background:rgba(255,255,255,.04);border-radius:8px;padding:8px"><div style="font-size:.6rem;color:var(--sub);letter-spacing:1px;margin-bottom:2px">STRIKING</div><div style="font-weight:700;font-size:.8rem;color:${stW===f1?'var(--red)':'var(--blue)'}">${stW.name.split(' ')[0]}</div></div>
      <div style="background:rgba(255,255,255,.04);border-radius:8px;padding:8px"><div style="font-size:.6rem;color:var(--sub);letter-spacing:1px;margin-bottom:2px">GRAPPLING</div><div style="font-weight:700;font-size:.8rem;color:${grW===f1?'var(--red)':'var(--blue)'}">${grW.name.split(' ')[0]}</div></div>
      <div style="background:rgba(255,255,255,.04);border-radius:8px;padding:8px"><div style="font-size:.6rem;color:var(--sub);letter-spacing:1px;margin-bottom:2px">METHODE</div><div style="font-weight:700;font-size:.78rem;color:var(--gold)">${meth}</div></div>
    </div>
    <div style="background:${fav===f1?'rgba(229,9,20,.1)':'rgba(59,130,246,.1)'};border:1px solid ${fav===f1?'rgba(229,9,20,.3)':'rgba(59,130,246,.3)'};border-radius:10px;padding:13px;text-align:center;margin-bottom:12px">
      <div style="font-size:.63rem;letter-spacing:3px;color:var(--sub);margin-bottom:4px">KI-VORHERSAGE</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:${fav===f1?'var(--red)':'var(--blue)'}">🏆 ${fav.name}</div>
      <div style="font-size:.76rem;color:var(--sub);margin-top:3px">Siegchance: <b style="color:white">${favPct}%</b> · <b style="color:white">${meth}</b></div>

        return`<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;font-size:.7rem"><div style="width:22px;text-align:right;font-weight:700;color:${c1}">${v1}</div><div style="flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;position:relative"><div style="position:absolute;right:50%;width:${Math.max(0,v1-v2)/2}%;height:100%;background:${c1}"></div><div style="position:absolute;left:50%;width:${Math.max(0,v2-v1)/2}%;height:100%;background:${c2}"></div></div><div style="width:22px;font-weight:700;color:${c2}">${v2}</div><div style="width:26px;text-align:center;color:var(--sub);font-size:.63rem">${k}</div></div>`;

const TRAIN_DUR=4*60*60*1000;
let trainingSlots=[null,null,null];
function renderTrainingUI(){return`<div class="sec-title">🏋️ TRAINING <span>CAMP</span></div><div class="sec-sub">Bis zu 3 Fighter gleichzeitig – nach 4h gibt es Stat-Punkte</div><div style="background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:.78rem;color:var(--sub)">💡 Belohnung: <b style="color:white">+2 zu einem zufälligen Stat</b> + <b style="color:white">50🪙</b></div><div id="trainingCont"></div>`;}
function renderTrainingContent(){
  const el=document.getElementById('trainingCont');if(!el)return;
  const now=Date.now();
  let html='';
  for(let slot=0;slot<3;slot++){
    const tr=trainingSlots[slot];
    if(!tr){
      html+=`<div style="background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:.82rem;letter-spacing:3px;color:var(--sub);margin-bottom:8px">TRAININGSPLATZ ${slot+1}</div>
        ${myCol.length?`<select id="tSel${slot}" style="width:100%;margin-bottom:8px">
          ${myCol.map((f,i)=>`<option value="${i}">${f.name} (LV${f.level||1}) ${'★'.repeat(f.stars)}</option>`).join('')}
        </select>
        <button class="btn btn-bl" onclick="startTraining(${slot})" style="width:100%;padding:8px;font-size:.8rem">🏋️ Training starten</button>`:'<div style="color:var(--sub);font-size:.8rem">Keine Fighter in Collection</div>'}
      </div>`;
    } else {
      const f=myCol[tr.idx];
      const elapsed=now-tr.startTime;
      const done=elapsed>=TRAIN_DUR;
      const pct=Math.min(100,(elapsed/TRAIN_DUR)*100);
      const rem=TRAIN_DUR-elapsed;
      const hh=Math.floor(rem/3600000),mm=Math.floor((rem%3600000)/60000);
      html+=`<div style="background:var(--card-bg);border:1px solid rgba(59,130,246,.2);border-radius:12px;padding:14px;margin-bottom:10px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:.82rem;letter-spacing:3px;color:${done?'#22c55e':'var(--blue)'};margin-bottom:6px">PLATZ ${slot+1} – ${f?f.name:'???'}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div style="flex:1;height:7px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${done?'#22c55e':'var(--blue)'};border-radius:4px;transition:width .5s"></div></div>
          <div style="font-size:.72rem;color:var(--sub)">${done?'FERTIG!':hh+'h '+mm+'m'}</div>
        </div>
        ${done?`<button class="btn btn-gr" style="width:100%;padding:8px;font-size:.8rem" onclick="collectTraining(${slot})">✅ BELOHNUNG ABHOLEN</button>`:
          `<button class="btn btn-gh" style="width:100%;padding:7px;font-size:.78rem" onclick="cancelTraining(${slot})">Abbrechen</button>`}
      </div>`;
    }
  }
  el.innerHTML=html;
  if(trainingSlots.some(s=>s&&(Date.now()-s.startTime)<TRAIN_DUR)){setTimeout(renderTrainingContent,15000);}
}
function startTraining(slot){
  const sel=document.getElementById('tSel'+slot);if(!sel||sel.value===''){toast('Fighter wählen!','red');return;}
  const idx=parseInt(sel.value);
  if(trainingSlots.some(s=>s&&s.idx===idx)){toast('Dieser Fighter trainiert bereits!','red');return;}
  trainingSlots[slot]={idx,startTime:Date.now()};
  toast('Training gestartet! Komm in 4h wieder.','blue');
  renderTrainingContent();
}
function cancelTraining(slot){trainingSlots[slot]=null;renderTrainingContent();}
function collectTraining(slot){
  const tr=trainingSlots[slot];if(!tr)return;
  const f=myCol[tr.idx];if(!f){trainingSlots[slot]=null;renderTrainingContent();return;}
  const statToBoost=rand(statKeys);
  f.stats[statToBoost]=Math.min(99,(f.stats[statToBoost]||70)+2);
  coins+=50;
  toast(`${f.name}: +2 ${statToBoost} + 50🪙`,'green');
  trainingSlots[slot]=null;
  updateTopbar();saveUser();renderTrainingContent();
}

document.getElementById('loginMsg').textContent='';
// Pre-init spin wheel
setTimeout(()=>{if(document.getElementById('wCanvas'))drawWheel();},100);

</script>
