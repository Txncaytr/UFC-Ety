function spinW(){if(wSpinning)return;wSpinning=true;const b=$i('spinBtnEl');if(b){b.disabled=true;b.style.opacity='.5';}const sr=$i('spinResEl');if(sr)sr.style.display='none';const winIdx=_f(_r()*SC),win=W_SEGS[winIdx];const extra=(6+_f(_r()*4))*Math.PI*2;const cur=((wAngle%(Math.PI*2))+Math.PI*2)%(Math.PI*2);const tgt=((-winIdx*SA-SA/2)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);let delta=tgt-cur;if(delta<=0)delta+=Math.PI*2;const endA=wAngle+extra+delta,dur=4000,startA=wAngle,startT=performance.now();function ease(t){return 1-Math.pow(1-t,4);}function anim(now){const el=now-startT,t=_m(el/dur,1);wAngle=startA+(endA-startA)*ease(t);drawWheel(wAngle);if(t<1)requestAnimationFrame(anim);else{wSpinning=false;_ls('ufcSpin',''+Date.now());showSpinResult(win);checkSpinCD();}}requestAnimationFrame(anim);}

function initScratch(f){
const old=$i('scratchCanvas'),nc=old.cloneNode(false);old.parentNode.replaceChild(nc,old);
const canvas=$i('scratchCanvas'),ctx=canvas.getContext('2d'),ip=f.prime,W=280,H=280;
canvas.width=W;canvas.height=H;
const g=ctx.createLinearGradient(0,0,W,H);if(ip){g.addColorStop(0,'#3a2800');g.addColorStop(1,'#5a3f00');}else{g.addColorStop(0,'#1a0505');g.addColorStop(1,'#2a0a0a');}
ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle=ip?'rgba(245,166,35,.12)':'rgba(229,9,20,.12)';
for(let i=0;i<300;i++){ctx.beginPath();ctx.arc(_r()*W,_r()*H,_r()*4+1,0,Math.PI*2);ctx.fill();}
ctx.fillStyle=ip?'#f5a623':'#e50914';ctx.font='bold 16px Arial';ctx.textAlign='center';ctx.fillText('✦ SCRATCH HERE ✦',W/2,H/2-8);ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='12px Arial';ctx.fillText('drag to reveal',W/2,H/2+14);
let scratching=false,cnt=0;
function gp(e){const r=canvas.getBoundingClientRect(),sx=W/r.width,sy=H/r.height,src=e.touches?e.touches[0]:e;return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};}
function doS(e){e.preventDefault();if(!scratching)return;const p=gp(e);ctx.globalCompositeOperation='destination-out';ctx.beginPath();ctx.arc(p.x,p.y,W*.12,0,Math.PI*2);ctx.fill();cnt++;if(cnt%4===0&&!scratchDone)chkReveal(ctx,f,W,H);}
canvas.addEventListener('mousedown',e=>{scratching=true;doS(e);});canvas.addEventListener('mousemove',e=>{if(scratching)doS(e);});canvas.addEventListener('mouseup',()=>scratching=false);canvas.addEventListener('mouseleave',()=>scratching=false);canvas.addEventListener('touchstart',e=>{scratching=true;doS(e);},{passive:false});canvas.addEventListener('touchmove',e=>{if(scratching)doS(e);},{passive:false});canvas.addEventListener('touchend',()=>scratching=false);}
function chkReveal(ctx,f,W,H){const d=ctx.getImageData(0,0,W,H).data;let t=0;for(let i=3;i<d.length;i+=4)if(d[i]<128)t++;if(t/(d.length/4)>0.4)triggerFullReveal(f);}

const[n1,w1]=v1.split('||'),[n2,w2]=v2.split('||');
const f1=fighters.find(x=>x.name===n1&&x.weight===w1),f2=fighters.find(x=>x.name===n2&&x.weight===w2);
if(!f1||!f2||f1.name===f2.name){el.innerHTML='<div style="color:var(--sub);text-align:center;padding:20px">Zwei verschiedene Fighter wählen</div>';return;}
function baseScore(f){const s=f.stats;return(s.STR*.22+s.GRP*.18+s.SPD*.18+s.PWR*.20+s.CHN*.12+s.CRD*.10)*(f.prime?1.15:1)*((f.level||1)*0.05+0.95);}
const b1=baseScore(f1),b2=baseScore(f2),total=b1+b2;
const pct1=_rd((b1/total)*100),pct2=100-pct1;
const fav=pct1>=pct2?f1:f2,favPct=_mx(pct1,pct2);
function catWin(fa,fb,keys){return keys.reduce((a,k)=>a+(fa.stats[k]||70),0)>=keys.reduce((a,k)=>a+(fb.stats[k]||70),0)?fa:fb;}
const stW=catWin(f1,f2,['STR','SPD','PWR']),grW=catWin(f1,f2,['GRP','CHN','CRD']);
const meth=f1.stats.GRP>85||f2.stats.GRP>85?'Submission':favPct>65?'KO/TKO':'Decision';
const s1=f1.stats,s2=f2.stats;
el.innerHTML=`<div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:16px">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px">
<div class="tc-f1"><div class="tx-h">${f1.name}</div><div style="color:var(--sub);font-size:.7rem">${'★'.repeat(f1.stars)}</div></div>
<div style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--red)">VS</div>
<div class="tc-f1"><div class="tx-h">${f2.name}</div><div style="color:var(--sub);font-size:.7rem">${'★'.repeat(f2.stars)}</div></div>
</div>
<div style="margin-bottom:12px">
<div style="display:flex;justify-content:space-between;font-size:.7rem;color:var(--sub);margin-bottom:3px"><span>${pct1}%</span><span>SIEGCHANCE</span><span>${pct2}%</span></div>
<div style="height:12px;border-radius:6px;overflow:hidden;display:flex"><div style="width:${pct1}%;background:var(--red)"></div><div style="width:${pct2}%;background:var(--blue)"></div></div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px;text-align:center">
<div style="background:rgba(255,255,255,.04);border-radius:8px;padding:8px"><div style="font-size:.6rem;color:var(--sub);letter-spacing:1px;margin-bottom:2px">STRIKING</div><div style="font-weight:700;font-size:.8rem;color:${stW===f1?'var(--red)':'var(--blue)'}">${stW.name.split(' ')[0]}</div></div>
<div style="background:rgba(255,255,255,.04);border-radius:8px;padding:8px"><div style="font-size:.6rem;color:var(--sub);letter-spacing:1px;margin-bottom:2px">GRAPPLING</div><div style="font-weight:700;font-size:.8rem;color:${grW===f1?'var(--red)':'var(--blue)'}">${grW.name.split(' ')[0]}</div></div>
<div style="background:rgba(255,255,255,.04);border-radius:8px;padding:8px"><div style="font-size:.6rem;color:var(--sub);letter-spacing:1px;margin-bottom:2px">METHODE</div><div style="font-weight:700;font-size:.78rem;color:var(--gold)">${meth}</div></div>
</div>
<div style="background:${fav===f1?'rgba(229,9,20,.1)':'rgba(59,130,246,.1)'};border:1px solid ${fav===f1?'rgba(229,9,20,.3)':'rgba(59,130,246,.3)'};border-radius:10px;padding:13px;text-align:center;margin-bottom:12px">
<div style="font-size:.63rem;letter-spacing:3px;color:var(--sub);margin-bottom:4px">KI-VORHERSAGE</div>
<div style="font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:${fav===f1?'var(--red)':'var(--blue)'}">🏆 ${fav.name}</div>
<div style="font-size:.76rem;color:var(--sub);margin-top:3px">Siegchance: <b style="color:white">${favPct}%</b> · <b style="color:white">${meth}</b></div>
</div>
<div style="background:rgba(255,255,255,.02);border-radius:9px;padding:9px">
${statKeys.map(k=>{const v1=s1[k]||70,v2=s2[k]||70;const c1=v1>v2?'#22c55e':v1<v2?'var(--red)':'#888',c2=v2>v1?'#22c55e':v2<v1?'var(--red)':'#888';
return`<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;font-size:.7rem"><div style="width:22px;text-align:right;font-weight:700;color:${c1}">${v1}</div><div style="flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;position:relative"><div style="position:absolute;right:50%;width:${_mx(0,v1-v2)/2}%;height:100%;background:${c1}"></div><div style="position:absolute;left:50%;width:${_mx(0,v2-v1)/2}%;height:100%;background:${c2}"></div></div><div style="width:22px;font-weight:700;color:${c2}">${v2}</div><div style="width:26px;text-align:center;color:var(--sub);font-size:.63rem">${k}</div></div>`;
}).join('')}
</div>
</div>`;
}
let infoWeightFilter='';
function renderFighterInfoUI(){
return`${_hdr("🎴 FIGHTER","INFO","Alle ${fighters.length} Fighter – tippe zum Aufklappen")}

<input id="fiSearch" type="text" placeholder="🔍 Fighter suchen..." oninput="filterFighterInfo()" style="width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:white;font-family:Barlow,sans-serif;font-size:.85rem;outline:none;margin-bottom:10px">
<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px">
${['','Bantamweight','Featherweight','Lightweight','Welterweight','Middleweight','Heavyweight'].map((w,i)=>{
const labels=['Alle','BW','FW','LW','WW','MW','HW'];
return`<button class="btn ${!w?'btn-r':'btn-gh'}" id="fiBtn${i}" style="padding:4px 10px;font-size:.7rem;flex:unset" onclick="setInfoW('${w}',${i})">${labels[i]}</button>`;
}).join('')}
</div>
<div id="fighterInfoList"></div>`;
}
function setInfoW(w,btnIdx){
infoWeightFilter=w;
$a('[id^="fiBtn"]').forEach((b,i)=>{b.className='btn '+(i===btnIdx?'btn-r':'btn-gh');b.style.cssText='padding:4px 10px;font-size:.7rem;flex:unset';});
filterFighterInfo();
}
function filterFighterInfo(){
const q=($i('fiSearch')||{}).value?.toLowerCase()||'';
const list=$i('fighterInfoList');if(!list)return;
const pool=fighters.filter(f=>(!infoWeightFilter||f.weight===infoWeightFilter)&&(!q||f.name.toLowerCase().includes(q)||f.weight.toLowerCase().includes(q))).sort((a,b)=>b.stars-a.stars||(b.prime-a.prime));
if(!pool.length){list.innerHTML='<div class="empty"><div class="icon">🎴</div><p>Keine Fighter gefunden</p></div>';return;}
const inOwn=name=>myCol.some(c=>c.name===name);
list.innerHTML=pool.map(f=>{
const avg=_rd(Object.values(f.stats).reduce((a,b)=>a+b,0)/6);
const best=statKeys.reduce((a,k)=>f.stats[k]>f.stats[a]?k:a,statKeys[0]);
const id='fi_'+f.name.replace(/[^a-z0-9]/gi,'_');
return`<div class="fighter-card${f.prime?' prime':''}" style="flex-direction:column;align-items:stretch;cursor:pointer;margin-bottom:7px" onclick="toggleCardStats('${id}')">
<div style="display:flex;align-items:center;justify-content:space-between">
<div><div style="font-weight:700;font-size:.9rem">${f.name}${f.prime?' <span class="prime-badge">P</span>':''}</div>
<div style="font-size:.7rem;color:var(--sub);margin-top:1px">${f.weight} · ${'★'.repeat(f.stars)} · OVR ${avg} · Best: ${best}</div></div>
<div style="display:flex;align-items:center;gap:5px">${inOwn(f.name)?'<span style="font-size:.6rem;color:#22c55e;font-weight:700">✓ OWNED</span>':''}<span class="tx-sub">▼</span></div>
</div>
<div id="${id}" style="display:none;margin-top:7px;padding-top:7px;border-top:1px solid rgba(255,255,255,.06)">
${renderStatBars(f.stats)}
<div style="display:flex;gap:5px;margin-top:7px;flex-wrap:wrap">
<button class="btn btn-gh" style="padding:4px 10px;font-size:.7rem;flex:unset" onclick="event.stopPropagation();loadFighterIntoFight('${f.name}','${f.weight}')">⚔️ In Fight</button>
<button class="btn btn-gh" style="padding:4px 10px;font-size:.7rem;flex:unset" onclick="event.stopPropagation();loadFighterIntoPredictor('${f.name}','${f.weight}')">🔮 Predictor</button>
</div>
</div>
</div>`;
}).join('');
}
function loadFighterIntoFight(name,weight){
switchPage('fight',$a('.page-nav-btn')[1]);
setTimeout(()=>{
setPool('all');
const s=$i('fl1');
if(s)for(let i=0;i<s.options.length;i++){if(s.options[i].value.startsWith(name+'||')){s.selectedIndex=i;break;}}
updateFightPreview();
toast(name+' als Fighter 1 geladen','blue');
},200);
}
function loadFighterIntoPredictor(name,weight){
switchPage('extra',$a('.page-nav-btn')[5]);
currentInnerTab=2;
$a('.inner-tab').forEach((b,i)=>{b.className='inner-tab'+(i===2?' active':'');});
setTimeout(()=>{
renderPredictorUI_inject();
const s=$i('predF1');
if(s)for(let i=0;i<s.options.length;i++){if(s.options[i].value.startsWith(name+'||')){s.selectedIndex=i;break;}}
updatePrediction();
toast(name+' im Predictor','blue');
},200);
}
function renderPredictorUI_inject(){
const el=$i('mainContent');
if(el)el.innerHTML=renderPredictorUI();
}
const TRAIN_DUR=4*60*60*1000;
let trainingSlots=[null,null,null];
function renderTrainingUI(){return`${_hdr("🏋️ TRAINING","CAMP","Bis zu 3 Fighter gleichzeitig – nach 4h gibt es Stat-Punkte")}
<div style="background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:.78rem;color:var(--sub)">💡 Belohnung: <b style="color:white">+2 zu einem zufälligen Stat</b> + <b style="color:white">50🪙</b></div><div id="trainingCont"></div>`;}
function renderTrainingContent(){
const el=$i('trainingCont');if(!el)return;
const now=Date.now();
let html='';
for(let slot=0;slot<3;slot++){
const tr=trainingSlots[slot];
if(!tr){
html+=`<div style="background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px">
<div style="font-family:'Bebas Neue',sans-serif;font-size:.82rem;letter-spacing:3px;color:var(--sub);margin-bottom:8px">TRAININGSPLATZ ${slot+1}</div>
${myCol.length?`<select id="tSel${slot}" style="width:100%;margin-bottom:8px">
${myCol.map((f,i)=>`<option value="${i}">${f.name} (LV${f.level||1}) ${'★'.repeat(f.stars)}</option>`).join('')}
</select>
<button class="btn btn-bl" onclick="startTraining(${slot})" style="width:100%;padding:8px;font-size:.8rem">🏋️ Training starten</button>`:'<div style="color:var(--sub);font-size:.8rem">Keine Fighter in Collection</div>'}
</div>`;
} else {
const f=myCol[tr.idx];
const elapsed=now-tr.startTime;
const done=elapsed>=TRAIN_DUR;
const pct=_m(100,(elapsed/TRAIN_DUR)*100);
const rem=TRAIN_DUR-elapsed;
const hh=_f(rem/3600000),mm=_f((rem%3600000)/60000);
html+=`<div style="background:var(--card-bg);border:1px solid rgba(59,130,246,.2);border-radius:12px;padding:14px;margin-bottom:10px">
<div style="font-family:'Bebas Neue',sans-serif;font-size:.82rem;letter-spacing:3px;color:${done?'#22c55e':'var(--blue)'};margin-bottom:6px">PLATZ ${slot+1} – ${f?f.name:'???'}</div>
<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
<div style="flex:1;height:7px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${done?'#22c55e':'var(--blue)'};border-radius:4px;transition:width .5s"></div></div>
<div class="tx-sub">${done?'FERTIG!':hh+'h '+mm+'m'}</div>
</div>
${done?`<button class="btn btn-gr" style="width:100%;padding:8px;font-size:.8rem" onclick="collectTraining(${slot})">✅ BELOHNUNG ABHOLEN</button>`:
`<button class="btn btn-gh" style="width:100%;padding:7px;font-size:.78rem" onclick="cancelTraining(${slot})">Abbrechen</button>`}
</div>`;
}
}
el.innerHTML=html;
if(trainingSlots.some(s=>s&&(Date.now()-s.startTime)<TRAIN_DUR)){setTimeout(renderTrainingContent,15000);}
}
function startTraining(slot){
const sel=document.getElementById('tSel'+slot);if(!sel||sel.value===''){toast('Fighter wählen!','red');return;}
const idx=_i(sel.value);
if(trainingSlots.some(s=>s&&s.idx===idx)){toast('Dieser Fighter trainiert bereits!','red');return;}
trainingSlots[slot]={idx,startTime:Date.now()};
toast('Training gestartet! Komm in 4h wieder.','blue');
renderTrainingContent();
}
function cancelTraining(slot){trainingSlots[slot]=null;renderTrainingContent();}
function collectTraining(slot){
const tr=trainingSlots[slot];if(!tr)return;
const f=myCol[tr.idx];if(!f){trainingSlots[slot]=null;renderTrainingContent();return;}
const statToBoost=rand(statKeys);
f.stats[statToBoost]=_m(99,(f.stats[statToBoost]||70)+2);
coins+=50;
toast(`${f.name}: +2 ${statToBoost} + 50🪙`,'green');
trainingSlots[slot]=null;
updateTopbar();saveUser();renderTrainingContent();
}
$i('loginMsg').textContent='';
setTimeout(()=>{if($i('wCanvas'))drawWheel();},100);
</script>
</body>
</html>
