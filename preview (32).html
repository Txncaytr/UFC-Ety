<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UFC MadFut Game</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#b71c1c,#0d47a1);color:white;text-align:center;}
.nav{display:flex;justify-content:center;gap:10px;padding:10px;background:rgba(0,0,0,0.4);}
button{padding:10px;border:none;border-radius:10px;background:#ff9800;color:white;font-weight:bold;cursor:pointer;transition:0.3s;}
button:hover{background:#ffa726;}
.page{display:none;padding:20px;}
.active{display:block;}
.card{background:rgba(255,255,255,0.1);margin:5px;padding:10px;border-radius:10px;transition:0.3s;}
.card:hover{background:rgba(255,255,255,0.2);}
.selects, select{padding:5px;margin:5px;}
.packAnim{font-size:1.2em;font-weight:bold;margin:20px;}
</style>
</head>
<body>

<h1>🥊 UFC MADFUT GAME</h1>

<div id="loginPage" class="page active">
<h2>Optional Login / Register</h2>
<input id="username" type="text" placeholder="Username"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<button onclick="register()">Register</button><br>
<button onclick="guestPlay()">Play as Guest</button>
<p id="loginMsg"></p>
</div>

<div id="gamePage" class="page">
<h2>Coins: <span id="coins">0</span></h2>
<div class="nav">
<button onclick="showPage('home')">🏠 Home</button>
<button onclick="showPage('fight')">🥊 Fight</button>
<button onclick="showPage('packs')">🎁 Packs</button>
<button onclick="showPage('collection')">📦 Collection</button>
<button onclick="showPage('shop')">🛒 Shop</button>
<button onclick="showPage('log')">📜 Fight Log</button>
<button onclick="logout()">🔓 Logout</button>
</div>

<div id="subpages">
<div id="home" class="page active">
<h2>Welcome to UFC MadFut!</h2>
<p>Open packs, collect fighters, fight, earn coins, and collect rare PRIME fighters!</p>
</div>

<div id="packs" class="page">
<h3>Open Packs</h3>
<button onclick="openPack('Bantamweight')">Bantamweight</button>
<button onclick="openPack('Featherweight')">Featherweight</button>
<button onclick="openPack('Lightweight')">Lightweight</button>
<button onclick="openPack('Welterweight')">Welterweight</button>
<button onclick="openPack('Middleweight')">Middleweight</button>
<button onclick="openPack('Heavyweight')">Heavyweight</button>
<div id="packAnim" class="packAnim"></div>
<div id="packResult"></div>
</div>

<div id="shop" class="page">
<h3>Shop</h3>
<button onclick="buyPack(4)">4⭐ Pack (500 coins)</button>
<button onclick="buyPack(5)">5⭐ Pack (1000 coins)</button>
<button onclick="buyPrime()">🔥 PRIME Pack (2500 coins)</button>
<div id="shopResult"></div>
</div>

<div id="collection" class="page">
<h3>My Collection</h3>
<div id="collectionList"></div>
</div>

<div id="fight" class="page">
<h3>Fight</h3>
<select id="fightMode" onchange="populateFightDropdowns()">
<option value="collection">Use My Collection</option>
<option value="all">Use All Fighters</option>
</select><br>
<select id="fighter1"></select>
<select id="fighter2"></select>
<br><button onclick="simulateFight()">FIGHT</button>
<div id="fightResult"></div>
</div>

<div id="log" class="page">
<h3>Fight Log</h3>
<div id="fightLog"></div>
</div>
</div>
</div>

<script>
// --- Navigation ---
function showPage(id){
  if(id==='loginPage'||id==='gamePage'){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  } else {
    document.querySelectorAll('#subpages .page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
}

// --- Users & Persistence ---
let users=JSON.parse(localStorage.getItem("ufcUsers")||"{}");
let user=null,myCollection=[],coins=0,fightHistory=[],fighters=[];

// Populate fighters array
fighterData.forEach(f=>fighters.push({name:f[0],weight:f[1],stars:f[2],prime:f[3]}));

// --- Save/Load User ---
function saveUser(){if(user&&user.username!=="Guest"){users[user.username]={username:user.username,coins:coins,collection:myCollection,fightHistory:fightHistory}; localStorage.setItem("ufcUsers",JSON.stringify(users));}}
function loadUser(u){coins=u.coins; myCollection=u.collection; fightHistory=u.fightHistory;}

// --- Login/Register/Guest ---
function guestPlay(){user={username:"Guest"}; showPage('gamePage'); updateUI();}
function register(){const name=document.getElementById('username').value.trim(); if(!name){document.getElementById('loginMsg').innerText="Enter username";return;} if(users[name]){document.getElementById('loginMsg').innerText="Username taken";return;} user={username:name}; coins=1000; myCollection=[]; fightHistory=[]; saveUser(); showPage('gamePage'); updateUI();}
function login(){const name=document.getElementById('username').value.trim(); if(!name){document.getElementById('loginMsg').innerText="Enter username";return;} if(!users[name]){document.getElementById('loginMsg').innerText="User not found";return;} user={username:name}; loadUser(users[name]); showPage('gamePage'); updateUI();}
function logout(){user=null; showPage('loginPage');}

// --- Update UI ---
function updateUI(){document.getElementById('coins').innerText=coins; updateCollection(); populateFightDropdowns(); document.getElementById('fightLog').innerHTML=fightHistory.join('<hr>'); saveUser();}

// --- Packs ---
function openPack(weight){let pool=fighters.filter(f=>f.weight===weight); if(!pool.length){alert("No fighters"); return;} let pull=randomFighterByProbability(pool); myCollection.push(pull); animatePack(pull,"You pulled: "); updateUI();}
function randomFighterByProbability(pool){let roll=Math.random()*100; let filtered;if(roll<2) filtered=pool.filter(f=>f.prime); else if(roll<7) filtered=pool.filter(f=>f.stars===6); else if(roll<15) filtered=pool.filter(f=>f.stars===5); else if(roll<25) filtered=pool.filter(f=>f.stars===4); else filtered=pool.filter(f=>f.stars<4); if(filtered.length===0) filtered=pool; return filtered[Math.floor(Math.random()*filtered.length)];}
function animatePack(f,text){const anim=document.getElementById('packAnim'); anim.innerText="Opening pack..."; setTimeout(()=>{anim.innerText=`${text}${f.name} (${'⭐'.repeat(f.stars)})`; document.getElementById('packResult').innerHTML=anim.innerText;},1000);}

// --- Shop ---
function buyPack(stars){let cost=stars===4?500:1000; if(coins<cost){alert("Not enough coins"); return;} coins-=cost; let pool=fighters.filter(f=>f.stars>=stars && !f.prime); let pull=pool[Math.floor(Math.random()*pool.length)]; myCollection.push(pull); animatePack(pull,"Bought pack: "); updateUI();}
function buyPrime(){if(coins<2500){alert("Not enough coins"); return;} coins-=2500; let pool=fighters.filter(f=>f.prime); let pull=pool[Math.floor(Math.random()*pool.length)]; myCollection.push(pull); animatePack(pull,"Bought PRIME: "); updateUI();}

// --- Collection ---
function updateCollection(){let html=""; myCollection.forEach((f,i)=>{html+=`<div class="card">${f.name} (${'⭐'.repeat(f.stars)}) <button onclick="sellFighter(${i})">Sell</button></div>`;}); document.getElementById('collectionList').innerHTML=html;}
function sellFighter(i){let f=myCollection.splice(i,1)[0]; let value=f.prime?500:f.stars===6?400:f.stars===5?250:f.stars===4?150:f.stars===3?100:f.stars===2?50:15; coins+=value; updateUI();}

// --- Fight ---
function populateFightDropdowns(){let mode=document.getElementById('fightMode').value; let pool=mode==="collection"?myCollection:fighters; let f1=document.getElementById('fighter1'),f2=document.getElementById('fighter2'); f1.innerHTML=f2.innerHTML=""; pool.forEach(f=>{f1.innerHTML+=`<option value="${f.name}">${f.name} (${f.weight})</option>`; f2.innerHTML+=`<option value="${f.name}">${f.name} (${f.weight})</option>`;});}
function simulateFight(){let f1Name=document.getElementById('fighter1').value; let f2Name=document.getElementById('fighter2').value; let f1=fighters.find(f=>f.name===f1Name); let f2=fighters.find(f=>f.name===f2Name); if(!f1||!f2||f1.name===f2.name){alert("Select 2 different fighters"); return;} if(f1.weight!==f2.weight){alert("Same weight class only"); return;} let roll=Math.random(); let winner="",resultType=""; if(roll<1/3){winner=f1.name; resultType="KO";} else if(roll<2/3){winner=f2.name; resultType="Submission";} else{winner=Math.random()<0.5?f1.name:f2.name; resultType="Decision";} let html=`<b>${f1.name}</b> (${'⭐'.repeat(f1.stars)})<br><b>${f2.name}</b> (${'⭐'.repeat(f2.stars)})<br><b>Winner:</b> ${winner} (${resultType})`; document.getElementById('fightResult').innerHTML=html; fightHistory.push(html); updateUI();}
